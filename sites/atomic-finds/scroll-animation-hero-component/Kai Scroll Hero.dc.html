        <img src="assets/kai/pose-updisc.webp" alt="Kai raising the star-disc in both hands, gazing up" data-kai-pose="updisc" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; object-position: center bottom; transform-origin: bottom center; transform: scale(1.0); opacity: 0; will-change: opacity;">
        <img src="assets/kai/pose-mid.webp" alt="Kai closer, at three-quarter angle, star-disc at her temple, turning inward" data-kai-pose="mid" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; object-position: center bottom; transform-origin: bottom center; transform: scale(0.70); opacity: 0; will-change: opacity;">
        <img src="assets/kai/pose-turn.webp" alt="Kai turning back over her shoulder toward the viewer" data-kai-pose="turn" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; object-position: center bottom; transform-origin: bottom center; transform: scale(0.75); opacity: 0; will-change: opacity;">
        <img src="assets/kai/pose-close.webp" alt="Kai in close-up, near-direct eye contact" data-kai-pose="close" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; object-position: center bottom; transform-origin: bottom center; transform: scale(0.81); opacity: 0; will-change: opacity;">
        <img src="assets/kai/pose-smile.webp" alt="Kai with a warm welcoming smile" data-kai-pose="end" data-kai-ending="smile" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; object-position: center bottom; transform-origin: bottom center; transform: scale(0.82); opacity: 0; will-change: opacity;">
        <img src="assets/kai/pose-playful.webp" alt="Kai sticking her tongue out with a peace sign" data-kai-pose="end" data-kai-ending="playful" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; object-position: center bottom; transform-origin: bottom center; transform: scale(0.80); opacity: 0; will-change: opacity;">
      </div>

      <!-- z45: foreground cloud mist (fastest layer — parallax rise) -->
      <div ref="{{ mistRef }}" style="position: absolute; inset: -10% 0 0 0; z-index: 45; pointer-events: none; opacity: 0.8; background: linear-gradient(180deg, rgba(18,16,22,0) 40%, rgba(18,16,22,0.55) 75%, rgba(18,16,22,0.95) 100%); will-change: transform, opacity;"></div>

      <!-- z50: Beat 1 — headline over negative space -->
      <div ref="{{ beat1Ref }}" style="position: absolute; inset: 0; z-index: 50; display: flex; align-items: center; will-change: opacity, transform;">
        <div style="display: flex; flex-direction: column; align-items: flex-start; gap: 18px; max-width: 560px; padding: 48px; margin-left: 4vw; background: linear-gradient(90deg, rgba(18,16,22,0.5), rgba(18,16,22,0)); border-radius: 24px;">

          <div style="font-family: 'Tilda Script', cursive; font-size: clamp(26px, 2.6vw, 38px); color: #D4822A; text-shadow: 0 0 12px rgba(212,130,42,0.55);">handpicked under night skies</div>
        </div>

      <!-- z50: Beat 2 — push-in body, lower third -->

        <p style="margin: 0; max-width: 640px; text-align: center; font-size: clamp(20px, 2vw, 28px); line-height: 1.5; color: #F0E8D8; text-shadow: 0 2px 18px rgba(18,16,22,0.9);">Curated rattan &amp; bamboo treasures, restored in Austin — and sent your way from across the galaxy.</p>

      <!-- z55: Beat 3 — eye contact, CTA -->
      <div ref="{{ beat3Ref }}" style="position: absolute; left: 0; right: 0; bottom: 0; z-index: 55; display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 0 24px 10vh; opacity: 0; pointer-events: none; will-change: opacity, transform;">
        <p style="margin: 0; max-width: 620px; text-align: center; font-size: clamp(22px, 2.2vw, 32px); line-height: 1.4; color: #F0E8D8; text-shadow: 0 2px 18px rgba(18,16,22,0.95);">Every piece has a name, a past, and a place in your orbit.</p>
        <x-import component-from-global-scope="AtomicFindsDesignSystem_29110a.Button" hint-size="auto,48px">[ Meet the Family ]</x-import>

      <!-- z60: scroll cue -->
      <div ref="{{ cueRef }}" style="position: absolute; left: 0; right: 0; bottom: 28px; z-index: 60; display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; will-change: opacity;">

<script type="text/x-dc" data-dc-script data-props="{&quot;ending&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;smile&quot;,&quot;playful&quot;],&quot;default&quot;:&quot;playful&quot;,&quot;tsType&quot;:&quot;'smile' | 'playful'&quot;,&quot;section&quot;:&quot;Story&quot;},&quot;scrollLength&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:11,&quot;min&quot;:6,&quot;max&quot;:16,&quot;step&quot;:1,&quot;unit&quot;:&quot;screens&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Scroll&quot;},&quot;pushIntensity&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0.2,&quot;min&quot;:0.08,&quot;max&quot;:0.4,&quot;step&quot;:0.02,&quot;unit&quot;:&quot;×&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Scroll&quot;},&quot;showMist&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Layers&quot;}}">
class Component extends DCLogic {
  componentDidMount() {
    this.reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    this.progress = 0;
    this.onScroll = () => {
      if (this.raf) return;
      this.raf = requestAnimationFrame(() => {
        this.raf = null;
        this.update();
      });
    };
    this.applySetup();
    if (!this.reduced) {
      window.addEventListener('scroll', this.onScroll, { passive: true });
      window.addEventListener('resize', this.onScroll);
    }
  }

  componentDidUpdate() {
    this.applySetup();
  }

  componentWillUnmount() {
    window.removeEventListener('scroll', this.onScroll);
    window.removeEventListener('resize', this.onScroll);
    if (this.raf) cancelAnimationFrame(this.raf);
  }

  ending() {
    return this.props.ending ?? 'smile';
  }

  poseImgs() {
    return this.charEl ? Array.from(this.charEl.querySelectorAll('img')) : [];
  }

  skyImgs() {
    return this.bgEl ? Array.from(this.bgEl.querySelectorAll('img')) : [];
  }

  // linear ramp, clamped 0..1
  band(p, a, b) {
    return Math.min(Math.max((p - a) / (b - a), 0), 1);
  }

  // smooth ease-in-out (smootherstep) for the continuous push-in
  smooth(t) {
    t = Math.min(Math.max(t, 0), 1);
    return t * t * t * (t * (t * 6 - 15) + 10);
  }

  applySetup() {
    const range = this.rangeEl;
    if (!range) return;
    const screens = Math.max(4, this.props.scrollLength ?? 10);
    if (this.reduced) {
      range.style.height = '100vh';
      // static resolved end-state
      this.poseImgs().forEach((img) => {
        const pose = img.getAttribute('data-kai-pose');
        const endingAttr = img.getAttribute('data-kai-ending');
        const on = pose === 'end' && endingAttr === this.ending();
        img.style.opacity = on ? '1' : '0';
      });
      this.skyImgs().forEach((img) => {
        img.style.opacity = img.getAttribute('data-kai-sky') === '5' ? '1' : '0';
      });
      if (this.charEl) this.charEl.style.transform = 'scale(1.16)';
      if (this.bgEl) this.bgEl.style.transform = 'none';
      if (this.mistEl) this.mistEl.style.opacity = '0.2';
      if (this.cueEl) this.cueEl.style.opacity = '0';
      if (this.beat1El) this.beat1El.style.opacity = '0';
      if (this.beat2El) this.beat2El.style.opacity = '0';
      if (this.beat3El) {
        this.beat3El.style.opacity = '1';
        this.beat3El.style.pointerEvents = 'auto';
      }
      return;
    }
    range.style.height = (screens * 100) + 'vh';
    this.update();
  }

  update() {
    const range = this.rangeEl;
    if (!range || this.reduced) return;
    const rect = range.getBoundingClientRect();
    const total = Math.max(1, range.offsetHeight - window.innerHeight);
    const progress = Math.min(Math.max(-rect.top / total, 0), 1);
    this.progress = progress;

    const ending = this.ending();
    const push = this.props.pushIntensity ?? 0.18;

    // --- Character layer: continuous dolly push-in (transform only) ---
    // ease-in-out across the WHOLE track; scroll length controls the pace.
    const eased = this.smooth(progress);
    if (this.charEl) {
      const scale = 1.0 + eased * push;          // gentle continuous push-in (poses carry most of the framing)
      this.charEl.style.transform = 'scale(' + scale.toFixed(4) + ')';
    }

    // --- Character poses: six stages, gentle overlapping crossfades (zoom keeps running underneath) ---
    const poseOp = {
      wide: 1 - this.band(progress, 0.10, 0.20),
      updisc: this.band(progress, 0.10, 0.20) * (1 - this.band(progress, 0.28, 0.38)),
      mid: this.band(progress, 0.28, 0.38) * (1 - this.band(progress, 0.46, 0.56)),
      turn: this.band(progress, 0.46, 0.56) * (1 - this.band(progress, 0.62, 0.72)),
      close: this.band(progress, 0.62, 0.72) * (1 - this.band(progress, 0.80, 0.90)),
      end: this.band(progress, 0.80, 0.90)
    };
    this.poseImgs().forEach((img) => {
      const pose = img.getAttribute('data-kai-pose');
      const endingAttr = img.getAttribute('data-kai-ending');
      let o = poseOp[pose] ?? 0;
      if (pose === 'end' && endingAttr !== ending) o = 0;
      img.style.opacity = String(o);
    });

    // --- Sky background: five layers crossfade across the track (independent, slower windows) ---
    const skyOp = {
      '1': 1 - this.band(progress, 0.16, 0.24),
      '2': this.band(progress, 0.16, 0.24) * (1 - this.band(progress, 0.38, 0.46)),
      '3': this.band(progress, 0.38, 0.46) * (1 - this.band(progress, 0.58, 0.66)),
      '4': this.band(progress, 0.58, 0.66) * (1 - this.band(progress, 0.78, 0.86)),
      '5': this.band(progress, 0.78, 0.86)
    };
    this.skyImgs().forEach((img) => {
      img.style.opacity = String(skyOp[img.getAttribute('data-kai-sky')] ?? 0);
    });

    // --- Background layer: its own slower transform for parallax depth ---
    if (this.bgEl) {
      const bgScale = 1.0 + eased * 0.08;          // ~1/5 of character's zoom
      const bgTy = -progress * 2.2;                // percent, gentle
      this.bgEl.style.transform = 'scale(' + bgScale.toFixed(4) + ') translateY(' + bgTy.toFixed(3) + '%)';
    }

    // --- Foreground mist: fastest layer, falls away as we rise ---
    const showMist = this.props.showMist ?? true;
    if (this.mistEl) {
      this.mistEl.style.transform = 'translateY(' + (progress * 16).toFixed(2) + '%)';
      this.mistEl.style.opacity = showMist ? String(Math.max(0, 0.8 - progress * 1.3)) : '0';
    }

    // --- Copy beats: independent scroll ranges, decoupled from crossfades ---
    if (this.beat1El) {
      const o = 1 - this.band(progress, 0.14, 0.30);
      this.beat1El.style.opacity = String(o);
      this.beat1El.style.transform = 'translateY(' + (-progress * 90).toFixed(1) + 'px)';
      this.beat1El.style.pointerEvents = o > 0.1 ? 'auto' : 'none';
    }
    if (this.beat2El) {
      const o = this.band(progress, 0.40, 0.50) * (1 - this.band(progress, 0.66, 0.74));
      this.beat2El.style.opacity = String(o);
      this.beat2El.style.transform = 'translateY(' + ((1 - this.band(progress, 0.40, 0.52)) * 24).toFixed(1) + 'px)';
    }
    if (this.beat3El) {
      const o = this.band(progress, 0.80, 0.90);
      this.beat3El.style.opacity = String(o);
      this.beat3El.style.transform = 'translateY(' + ((1 - o) * 28).toFixed(1) + 'px)';
      this.beat3El.style.pointerEvents = o > 0.5 ? 'auto' : 'none';
    }
    if (this.cueEl) {
      this.cueEl.style.opacity = String(Math.min(Math.max(1 - progress * 6, 0), 1));
    }
  }

  renderVals() {
    return {
      rangeRef: (el) => { this.rangeEl = el; },
      bgRef: (el) => { this.bgEl = el; },
      charRef: (el) => { this.charEl = el; },
      mistRef: (el) => { this.mistEl = el; },
      beat1Ref: (el) => { this.beat1El = el; },
      beat2Ref: (el) => { this.beat2El = el; },
      beat3Ref: (el) => { this.beat3El = el; },
      cueRef: (el) => { this.cueEl = el; }
    };
  }
}
</script>
