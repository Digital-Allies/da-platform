<!-- reference specimen (not a live design-system card) -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: #1E1E1E; display: flex; gap: 16px; flex-wrap: wrap; align-items: stretch; }
  .swatch { flex: 1; min-width: 120px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(245,200,66,0.15); }
  .swatch-color { height: 100px; display: flex; align-items: flex-end; padding: 12px; }
  .swatch-info { padding: 12px; background: #23201B; }
  .swatch-name { font-family: var(--font-display); font-size: 14px; color: #F0E8D8; margin-bottom: 2px; }
  .swatch-hex { font-family: var(--font-body); font-size: 11px; color: #9A8F7D; }
</style>
</head>
<body>
  <div class="swatch">
    <div class="swatch-color" style="background: #1E1E1E; color: #F0E8D8;">
      <span style="font-family: var(--font-body); font-size: 11px;">#1E1E1E</span>
    </div>
    <div class="swatch-info">
      <div class="swatch-name">Deep Charcoal</div>
      <div class="swatch-hex">Primary background</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background: #F5C842; color: #1E1E1E;">
      <span style="font-family: var(--font-body); font-size: 11px;">#F5C842</span>
    </div>
    <div class="swatch-info">
      <div class="swatch-name">Celestial Yellow</div>
      <div class="swatch-hex">Primary accent & glow</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background: #D4822A; color: #F0E8D8;">
      <span style="font-family: var(--font-body); font-size: 11px;">#D4822A</span>
    </div>
    <div class="swatch-info">
      <div class="swatch-name">Amber Orange</div>
      <div class="swatch-hex">Secondary accent & script</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background: #F0E8D8; color: #1E1E1E;">
      <span style="font-family: var(--font-body); font-size: 11px;">#F0E8D8</span>
    </div>
    <div class="swatch-info">
      <div class="swatch-name">Bone White</div>
      <div class="swatch-hex">Body text & foreground</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background: #2A2017; color: #F0E8D8;">
      <span style="font-family: var(--font-body); font-size: 11px;">#2A2017</span>
    </div>
    <div class="swatch-info">
      <div class="swatch-name">Rattan Black</div>
      <div class="swatch-hex">Card surfaces</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background: #556B4A; color: #F0E8D8;">
      <span style="font-family: var(--font-body); font-size: 11px;">#556B4A</span>
    </div>
    <div class="swatch-info">
      <div class="swatch-name">Woven Moss</div>
      <div class="swatch-hex">Eco tags & muted</div>
    </div>
  </div>
</body>
</html>
