<!-- reference specimen (not a live design-system card) -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: #1E1E1E; }
  .scale-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 16px; }
  .space-block { display: flex; flex-direction: column; align-items: center; }
  .space-visual { background: linear-gradient(135deg, rgba(245,200,66,0.3), rgba(212,130,42,0.15)); border-radius: 6px; margin-bottom: 8px; border: 1px solid rgba(245,200,66,0.2); }
  .space-label { font-family: var(--font-body); font-size: 11px; color: #9A8F7D; text-align: center; }
</style>
</head>
<body>
  <div class="scale-grid">
    <div class="space-block">
      <div class="space-visual" style="width: 40px; height: 4px;"></div>
      <div class="space-label">4px</div>
    </div>
    <div class="space-block">
      <div class="space-visual" style="width: 40px; height: 8px;"></div>
      <div class="space-label">8px</div>
    </div>
    <div class="space-block">
      <div class="space-visual" style="width: 40px; height: 12px;"></div>
      <div class="space-label">12px</div>
    </div>
    <div class="space-block">
      <div class="space-visual" style="width: 40px; height: 16px;"></div>
      <div class="space-label">16px</div>
    </div>
    <div class="space-block">
      <div class="space-visual" style="width: 40px; height: 20px;"></div>
      <div class="space-label">20px</div>
    </div>
    <div class="space-block">
      <div class="space-visual" style="width: 40px; height: 24px;"></div>
      <div class="space-label">24px</div>
    </div>
    <div class="space-block">
      <div class="space-visual" style="width: 40px; height: 32px;"></div>
      <div class="space-label">32px</div>
    </div>
    <div class="space-block">
      <div class="space-visual" style="width: 40px; height: 40px;"></div>
      <div class="space-label">40px</div>
    </div>
    <div class="space-block">
      <div class="space-visual" style="width: 40px; height: 48px;"></div>
      <div class="space-label">48px</div>
    </div>
  </div>
</body>
</html>
