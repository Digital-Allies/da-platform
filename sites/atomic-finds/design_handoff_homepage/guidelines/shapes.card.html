<!-- reference specimen (not a live design-system card) -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: #1E1E1E; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .radius-sample { display: flex; flex-direction: column; align-items: center; }
  .radius-box { width: 60px; height: 60px; background: linear-gradient(135deg, rgba(245,200,66,0.2), rgba(212,130,42,0.1)); border: 1px solid rgba(245,200,66,0.2); margin-bottom: 8px; }
  .radius-label { font-family: var(--font-body); font-size: 11px; color: #9A8F7D; text-align: center; }
</style>
</head>
<body>
  <div class="radius-sample">
    <div class="radius-box" style="border-radius: 6px;"></div>
    <div class="radius-label">6px</div>
  </div>
  <div class="radius-sample">
    <div class="radius-box" style="border-radius: 12px;"></div>
    <div class="radius-label">12px</div>
  </div>
  <div class="radius-sample">
    <div class="radius-box" style="border-radius: 18px;"></div>
    <div class="radius-label">18px</div>
  </div>
  <div class="radius-sample">
    <div class="radius-box" style="border-radius: 24px;"></div>
    <div class="radius-label">24px</div>
  </div>
  <div class="radius-sample">
    <div class="radius-box" style="border-radius: 999px; width: 80px; height: 40px;"></div>
    <div class="radius-label">pill</div>
  </div>
</body>
</html>
