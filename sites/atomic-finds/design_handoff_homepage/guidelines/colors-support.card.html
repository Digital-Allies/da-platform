<!-- reference specimen (not a live design-system card) -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: #1E1E1E; display: flex; gap: 16px; flex-wrap: wrap; }
  .swatch { flex: 1; min-width: 100px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(245,200,66,0.15); }
  .swatch-color { height: 80px; display: flex; align-items: flex-end; padding: 8px; }
  .swatch-info { padding: 10px; background: #23201B; }
  .swatch-name { font-family: var(--font-display); font-size: 12px; color: #F0E8D8; }
  .swatch-hex { font-family: var(--font-body); font-size: 10px; color: #9A8F7D; }
</style>
</head>
<body>
  <div class="swatch">
    <div class="swatch-color" style="background: #C4956A; color: #1E1E1E;"><span style="font-size: 10px;">Tan</span></div>
    <div class="swatch-info"><div class="swatch-name">Rattan Tan</div><div class="swatch-hex">#C4956A</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background: #D4A853; color: #1E1E1E;"><span style="font-size: 10px;">Honey</span></div>
    <div class="swatch-info"><div class="swatch-name">Bamboo Honey</div><div class="swatch-hex">#D4A853</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background: #C1502E; color: #F0E8D8;"><span style="font-size: 10px;">Clay</span></div>
    <div class="swatch-info"><div class="swatch-name">Austin Clay</div><div class="swatch-hex">#C1502E</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background: #211C14; color: #F0E8D8;"><span style="font-size: 10px;">Char3</span></div>
    <div class="swatch-info"><div class="swatch-name">Charcoal-3</div><div class="swatch-hex">#211C14</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background: #16140F; color: #F0E8D8;"><span style="font-size: 10px;">Char2</span></div>
    <div class="swatch-info"><div class="swatch-name">Charcoal-2</div><div class="swatch-hex">#16140F</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background: linear-gradient(135deg, rgba(245,200,66,0.15), rgba(212,130,42,0.1));"><span style="font-size: 10px;">Glow</span></div>
    <div class="swatch-info"><div class="swatch-name">Glow Overlay</div><div class="swatch-hex">Ambient warmth</div></div>
  </div>
</body>
</html>
