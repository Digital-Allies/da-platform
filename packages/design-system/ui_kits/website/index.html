<!DOCTYPE html>
<!-- @dsCard group="UI Kit — Website" name="Website UI Kit" subtitle="Click-through recreation of digitalallies.net — nav, hero, jargon jar, departments, pricing, footer" viewport="1280x1200" -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Allies — UI Kit</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
  <link rel="stylesheet" href="../../colors_and_type.css">

  <!-- React + Babel (pinned versions, required by skill) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    /* Reset only the page chrome; component styles live in JSX via inline + tokens. */
    * { box-sizing: border-box; }
    body { margin: 0; }
    a { color: inherit; }
    img { max-width: 100%; }
    button { font: inherit; }
    @media (max-width: 880px) {
      .da-md-stack { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Component scripts (order matters — primitives first) -->
  <script type="text/babel" src="./Primitives.jsx"></script>
  <script type="text/babel" src="./Nav.jsx"></script>
  <script type="text/babel" src="./Hero.jsx"></script>
  <script type="text/babel" src="./JargonJar.jsx"></script>
  <script type="text/babel" src="./Departments.jsx"></script>
  <script type="text/babel" src="./Diagrams.jsx"></script>
  <script type="text/babel" src="./Pricing.jsx"></script>
  <script type="text/babel" src="./Reliability.jsx"></script>
  <script type="text/babel" src="./FieldNotes.jsx"></script>
  <script type="text/babel" src="./Footer.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [lang, setLang] = useState("en");
      const [active, setActive] = useState("");

      const onNavClick = (id) => {
        const el = document.getElementById(id);
        if (el) {
          window.scrollTo({ top: el.offsetTop - 80, behavior: "smooth" });
        }
        setActive(id);
      };

      return (
        <div>
          <Nav activeSection={active} lang={lang} onLangChange={setLang} onNavClick={onNavClick} />
          <Hero lang={lang} />
          <JargonJar />
          <Departments lang={lang} />
          <Diagrams />
          <Pricing />
          <Reliability />
          <FieldNotes />
          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
