<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1280px;height:854px;display:flex;background:var(--charcoal);overflow:hidden}
.main{flex:1;display:flex;align-items:center;justify-content:center;background:var(--charcoal)}
.mark{font-family:var(--font-headers);font-weight:700;font-size:220px;color:var(--bone-white);letter-spacing:-0.02em;line-height:1}
.strip{width:120px;display:flex;flex-direction:column}
.strip div{flex:1}
</style>
</head>
<body>
<div class="main"><div class="mark">DA</div></div>
<div class="strip">
<div style="background:var(--bone-white)"></div>
<div style="background:var(--light-pink)"></div>
<div style="background:var(--pulse-blue)"></div>
<div style="background:var(--signal-red)"></div>
</div>
</body>
</html>
