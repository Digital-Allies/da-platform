<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Technical Lace & Symmetry Break" subtitle="Ruled-paper 20 px grid + the +8 px red-dot offset" viewport="700x290" -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Technical Lace Grid</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 0; background: transparent; background-image: none; }
    .card { width: 700px; padding: 0; box-sizing: border-box; border: 1px solid var(--charcoal); }
    .stage { position: relative; background: var(--bone-white);
      background-image:
        linear-gradient(rgba(45,45,45,0.12) 0.5px, transparent 0.5px),
        linear-gradient(90deg, rgba(45,45,45,0.12) 0.5px, transparent 0.5px),
        radial-gradient(rgba(45,45,45,0.35) 1px, transparent 1.5px);
      background-size: 20px 20px, 20px 20px, 100px 100px;
      background-position: 0 0, 0 0, 50px 50px;
      height: 280px;
      padding: 24px;
    }
    .mini { position: absolute; background: var(--bone-white); border: 1px solid var(--charcoal); padding: 14px; box-sizing: border-box; width: 220px; top: 70px; left: calc(50% - 110px); text-align: center; }
    .mini h4 { font-family: var(--font-headers); margin: 0 0 6px; font-size: 13px; font-weight:700; }
    .mini p { font-family: var(--font-details); margin: 0 0 10px; font-size: 10px; line-height: 1.5; color: var(--fg-muted); }
    .mini .badge { display: inline-block; padding: 4px 12px; background: var(--accent); color: #fff; font-family: var(--font-details); font-size: 9px; font-weight: 700; border: 1px solid var(--charcoal); letter-spacing: 0.1em; }
    .mini .dot { position: absolute; top: -7px; left: calc(50% - 7px); width: 14px; height: 14px; background: var(--signal); border: 1px solid var(--charcoal); border-radius: 50%; }
    /* Symmetry break: shift dot 8px right */
    .mini.break .dot { left: calc(50% + 1px); transition: left 0.4s var(--ease-out); }
    .ruler { position: absolute; left: 24px; bottom: 14px; font-family: var(--font-details); font-size: 9px; color: var(--fg-soft); letter-spacing: 0.18em; text-transform: uppercase; }
    .label { position: absolute; right: 24px; bottom: 14px; font-family: var(--font-details); font-size: 9px; color: var(--signal); letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700; }
  </style>
</head>
<body>
  <div class="card">
    <div class="stage">
      <div class="mini break">
        <div class="dot"></div>
        <h4>Visual Balance</h4>
        <p>Red dot nudged +8 px right of center: a calculated "visual itch."</p>
        <span class="badge">ALIGNED</span>
      </div>
      <span class="ruler">[ Technical Lace · 20 px ]</span>
      <span class="label">◆ Symmetry Break</span>
    </div>
  </div>
</body>
</html>
