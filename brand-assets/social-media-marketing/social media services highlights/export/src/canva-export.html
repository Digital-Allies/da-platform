<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Allies — Social Graphics (Canva Export)</title>
<link rel="stylesheet" href="colors_and_type.css">
<meta name="ext-resource-dependency" content="assets/min/icon-compass.png" data-resource-id="iconCompass">
<meta name="ext-resource-dependency" content="assets/min/icon-engine.png" data-resource-id="iconEngine">
<meta name="ext-resource-dependency" content="assets/min/icon-metronome.png" data-resource-id="iconMetronome">
<meta name="ext-resource-dependency" content="assets/min/icon-topo.png" data-resource-id="iconTopo">
<meta name="ext-resource-dependency" content="assets/min/design-icon.png" data-resource-id="iconDesign">
<meta name="ext-resource-dependency" content="assets/min/integrations-icon.png" data-resource-id="iconIntegrations">
<meta name="ext-resource-dependency" content="assets/min/automation-icon.png" data-resource-id="iconAutomation">
<meta name="ext-resource-dependency" content="assets/min/support-icon.png" data-resource-id="iconSupport">
<meta name="ext-resource-dependency" content="assets/min/brand-art-dot-square.png" data-resource-id="dotSquare">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #E8E4DB; font-family: "JetBrains Mono", monospace; }
  :root {
    --font-headers: "Lexend Deca", sans-serif;
    --font-body: "JetBrains Mono", monospace;
    --font-details: "JetBrains Mono", monospace;
  }
  .page { display: flex; align-items: center; justify-content: center; }
  .page > * { flex: 0 0 auto; }
</style>
</head>
<body>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#F9F6F0"/>
    <rect x="18" y="18" width="64" height="64" fill="none" stroke="#2D2D2D" stroke-width="1.5"/>
    <circle cx="50" cy="50" r="8" fill="#C5301A"/>
    <text x="50" y="92" font-family="monospace" font-size="9" fill="#2D2D2D" text-anchor="middle" letter-spacing="2">DA</text>
  </svg>
</template>

<script type="text/babel" src="lib.jsx"></script>
<script type="text/babel" src="covers.jsx"></script>

<script type="text/babel">
const ACCENT = "#C5301A";

const STORY_PROJECTS = [
  { id:"integration-studio", name:"AI Web Studio", url:"digitalallies.net", category:"Web Tools", problem:"Dev cycles too slow — clients couldn't visualize changes before launch.", solution:"Live AI integration studio: edit, inspect, and preview in one view." },
  { id:"lead-manager", name:"Lead Management System", url:"digitalallies.net", category:"CRM / Automation", problem:"Leads falling through the cracks of a shared spreadsheet.", solution:"Full CRM with pipeline stages, analytics dashboard, and CSV export." },
  { id:"e17", name:"E17 Cooperative Intranet", url:"digitalallies.net", category:"Community Platform", problem:"A 40-member co-op running entirely on group texts and email chains.", solution:"Private intranet: docs, announcements, and a member directory." },
  { id:"chapter-vine", name:"Chapter & Vine Books", url:"digitalallies.net", category:"Retail", problem:"A beloved indie bookstore with zero online presence.", solution:"Immersive catalog site with inventory, events, and direct orders." },
  { id:"gourmet-bites", name:"Gourmet Bites", url:"digitalallies.net", category:"Food & Beverage", problem:"Phone-only ordering — staff spending hours per shift on calls.", solution:"Online ordering with live menu, cart, and checkout." },
  { id:"seo-auditor", name:"SEO Audit Assistant", url:"digitalallies.net", category:"SEO", problem:"Sites buried in search results with no insight into why.", solution:"Automated audit tool with scores and step-by-step recommendations." },
];

// ── Vibe Cover ────────────────────────────────────────────────────────────
function VibeCover({ accent }) {
  return (
    <div style={{ width:1080, height:1080, background:"#F9F6F0", backgroundImage:laceBg(20,0.065), position:"relative", overflow:"hidden", fontFamily:"var(--font-body,'JetBrains Mono',monospace)" }}>
      <div style={{ position:"absolute", inset:40, border:"1px solid #2D2D2D", pointerEvents:"none" }} />
      {[
        { top:40, left:40, borderTop:"1px solid", borderLeft:"1px solid", transform:"translate(-1px,-1px)" },
        { top:40, right:40, borderTop:"1px solid", borderRight:"1px solid", transform:"translate(1px,-1px)" },
        { bottom:40, left:40, borderBottom:"1px solid", borderLeft:"1px solid", transform:"translate(-1px,1px)" },
        { bottom:40, right:40, borderBottom:"1px solid", borderRight:"1px solid", transform:"translate(1px,1px)" },
      ].map((s,i) => <div key={i} style={{ position:"absolute", width:28, height:28, borderColor:"#2D2D2D", ...s }} />)}
      <div style={{ position:"absolute", top:72, left:72, right:72, display:"flex", justifyContent:"space-between" }}>
        <Eyebrow size={14}>DIGITAL ALLIES</Eyebrow>
        <Eyebrow size={14}>KINGMAN AZ · EST. 2024</Eyebrow>
      </div>
      <svg style={{ position:"absolute", top:0, left:0, width:"100%", height:"100%", pointerEvents:"none" }} viewBox="0 0 1080 1080">
        {Array.from({length:32},(_,i) => {
          const a=(i/32)*360, rad=a*Math.PI/180, r1=120, r2=460;
          return <line key={i} x1={540+Math.cos(rad)*r1} y1={460+Math.sin(rad)*r1} x2={540+Math.cos(rad)*r2} y2={460+Math.sin(rad)*r2} stroke="#2D2D2D" strokeWidth="0.5" opacity="0.18"/>;
        })}
        {[80,160,240,340,450].map((r,i) => <circle key={i} cx="540" cy="460" r={r} fill="none" stroke="#2D2D2D" strokeWidth="0.5" opacity={0.12+i*0.03} strokeDasharray={i%2===0?"none":"3 6"}/>)}
        <circle cx="540" cy="460" r="14" fill={accent}/>
        <circle cx="540" cy="460" r="28" fill="none" stroke={accent} strokeWidth="1" opacity="0.3"/>
        <circle cx="540" cy="460" r="48" fill="none" stroke={accent} strokeWidth="0.5" opacity="0.15"/>
        <line x1="40" y1="800" x2="1040" y2="800" stroke="#2D2D2D" strokeWidth="0.5" opacity="0.12"/>
        <line x1="40" y1="460" x2="1040" y2="460" stroke="#2D2D2D" strokeWidth="0.5" strokeDasharray="2 8" opacity="0.15"/>
        <line x1="540" y1="40" x2="540" y2="880" stroke="#2D2D2D" strokeWidth="0.5" strokeDasharray="2 8" opacity="0.15"/>
      </svg>
      <div style={{ position:"absolute", bottom:72, left:72, right:72, display:"flex", justifyContent:"space-between", alignItems:"flex-end" }}>
        <div>
          <div style={{ fontFamily:"var(--font-headers,'Lexend Deca',sans-serif)", fontSize:52, fontWeight:700, lineHeight:1.0, letterSpacing:"-0.02em" }}>Technological<br/>Solutions.</div>
          <div style={{ fontFamily:"var(--font-body,'JetBrains Mono',monospace)", fontSize:15, marginTop:16, color:"#5a5347", lineHeight:1.5 }}>For people with better things to do.</div>
        </div>
        <img src={window.__resources.dotSquare} alt="" style={{ width:80, height:80, mixBlendMode:"multiply" }} />
      </div>
    </div>
  );
}

// ── IG Story — Project Highlight ──────────────────────────────────────────
function StoryProjectHighlight({ project, accent }) {
  return (
    <div style={{ width:1080, height:1920, background:"#F9F6F0", backgroundImage:laceBg(24,0.065), position:"relative", overflow:"hidden", fontFamily:"var(--font-body,'JetBrains Mono',monospace)", color:"#2D2D2D" }}>
      <div style={{ position:"absolute", inset:48, border:"1px solid #2D2D2D", pointerEvents:"none" }} />
      <div style={{ position:"absolute", top:110, left:96, right:96, display:"flex", justifyContent:"space-between" }}>
        <Eyebrow size={16}>DIGITAL ALLIES · PAST WORK</Eyebrow>
        <SignalDot size={13} />
      </div>
      <div style={{ position:"absolute", top:260, left:96 }}>
        <Eyebrow size={13} color="#7a6f5e">{project.category}</Eyebrow>
      </div>
      <div style={{ position:"absolute", top:310, left:96, right:96, fontFamily:"var(--font-headers,'Lexend Deca',sans-serif)", fontSize:108, fontWeight:700, lineHeight:0.9, letterSpacing:"-0.03em" }}>{project.name}</div>
      <div style={{ position:"absolute", top:720, left:96, right:96, height:1, background:"#2D2D2D" }} />
      <div style={{ position:"absolute", top:760, left:96, right:96 }}>
        <div style={{ marginBottom:56 }}>
          <div style={{ display:"flex", gap:20, alignItems:"flex-start" }}>
            <div style={{ fontFamily:"var(--font-details,'JetBrains Mono',monospace)", fontSize:13, letterSpacing:"0.14em", color:"#C5301A", marginTop:4, flexShrink:0 }}>BEFORE</div>
            <div style={{ fontFamily:"var(--font-headers,'Lexend Deca',sans-serif)", fontSize:52, fontWeight:500, lineHeight:1.05, letterSpacing:"-0.015em", color:"#5a5347" }}>{project.problem}</div>
          </div>
        </div>
        <div>
          <div style={{ display:"flex", gap:20, alignItems:"flex-start" }}>
            <div style={{ fontFamily:"var(--font-details,'JetBrains Mono',monospace)", fontSize:13, letterSpacing:"0.14em", color:"#3A7BD5", marginTop:4, flexShrink:0 }}>AFTER&nbsp;</div>
            <div style={{ fontFamily:"var(--font-headers,'Lexend Deca',sans-serif)", fontSize:52, fontWeight:600, lineHeight:1.05, letterSpacing:"-0.015em" }}>{project.solution}</div>
          </div>
        </div>
      </div>
      <svg style={{ position:"absolute", top:1150, left:96, width:888, height:400, opacity:0.1 }} viewBox="0 0 888 400">
        {Array.from({length:18},(_,i) => <line key={i} x1={i*52} y1="0" x2={i*52+200} y2="400" stroke="#2D2D2D" strokeWidth="0.5"/>)}
        <circle cx="444" cy="200" r="180" fill="none" stroke="#2D2D2D" strokeWidth="1"/>
        <circle cx="444" cy="200" r="100" fill="none" stroke="#2D2D2D" strokeWidth="0.5" strokeDasharray="3 5"/>
        <circle cx="444" cy="200" r="14" fill={accent}/>
      </svg>
      <div style={{ position:"absolute", top:1600, left:96, right:96 }}>
        <div style={{ fontFamily:"var(--font-details,'JetBrains Mono',monospace)", fontSize:18, color:"#7a6f5e", letterSpacing:"0.04em" }}>{project.url}</div>
      </div>
      <div style={{ position:"absolute", bottom:110, left:96, right:96, display:"flex", justifyContent:"space-between", alignItems:"flex-end" }}>
        <div>
          <Eyebrow size={13} color="#7a6f5e">BUILT BY</Eyebrow>
          <div style={{ fontFamily:"var(--font-headers,'Lexend Deca',sans-serif)", fontSize:40, fontWeight:600, marginTop:6 }}>digitalallies.net</div>
        </div>
        <Bracket size={22}>See More Work</Bracket>
      </div>
    </div>
  );
}

// ── X/Twitter Service Card ────────────────────────────────────────────────
function XServiceCard({ dept }) {
  return (
    <div style={{ width:1200, height:675, background:"#F9F6F0", backgroundImage:laceBg(22,0.065), position:"relative", overflow:"hidden", fontFamily:"var(--font-body,'JetBrains Mono',monospace)", color:"#2D2D2D" }}>
      <div style={{ position:"absolute", inset:36, border:"1px solid #2D2D2D" }} />
      <div style={{ position:"absolute", top:68, left:68, right:68, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <Eyebrow size={12}>{`DEPT · ${dept.n} / 04`}</Eyebrow>
        <Eyebrow size={12}>DIGITAL ALLIES · KINGMAN AZ</Eyebrow>
      </div>
      <div style={{ position:"absolute", top:130, right:80, width:280, height:280, opacity:0.9 }}>
        <img src={dept.icon} alt="" style={{ width:"100%", height:"100%", objectFit:"contain", mixBlendMode:"multiply" }} />
      </div>
      <div style={{ position:"absolute", top:148, left:68 }}>
        <div style={{ fontFamily:"var(--font-details,'JetBrains Mono',monospace)", fontSize:13, letterSpacing:"0.2em", color:"#7a6f5e" }}>{dept.code}</div>
        <div style={{ fontFamily:"var(--font-headers,'Lexend Deca',sans-serif)", fontSize:72, fontWeight:700, lineHeight:0.9, letterSpacing:"-0.025em", marginTop:8, maxWidth:640 }}>{dept.name}</div>
      </div>
      <div style={{ position:"absolute", top:380, left:68, maxWidth:560 }}>
        <div style={{ fontFamily:"var(--font-body,'JetBrains Mono',monospace)", fontSize:18, lineHeight:1.6, color:"#5a5347" }}>{dept.blurb}</div>
      </div>
      <div style={{ position:"absolute", bottom:68, left:68, right:68, display:"flex", justifyContent:"space-between", alignItems:"flex-end" }}>
        <div style={{ display:"flex", alignItems:"center", gap:16 }}>
          <SignalDot size={11} />
          <span style={{ fontSize:14, letterSpacing:"0.04em", color:"#5a5347" }}>digitalallies.net</span>
        </div>
        <Bracket size={16}>Inquire Within</Bracket>
      </div>
    </div>
  );
}

function Page({ children }) {
  return <div className="page" style={{ padding: "40px 0" }}>{children}</div>;
}

function ExportApp() {
  return (
    <div>
      {/* IG Square covers */}
      <Page><CoverDesign /></Page>
      <Page><CoverCooperation /></Page>
      <Page><CoverAutomation /></Page>
      <Page><CoverObservation /></Page>
      <Page><VibeCover accent={ACCENT} /></Page>
      <Page><CoverSet /></Page>
      {/* IG Stories */}
      <Page><StoryDepartments /></Page>
      {STORY_PROJECTS.map(p => <Page key={p.id}><StoryProjectHighlight project={p} accent={ACCENT} /></Page>)}
      {/* X service cards */}
      {DEPARTMENTS.map(d => <Page key={d.code}><XServiceCard dept={d} /></Page>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ExportApp />);
</script>

<div id="root"></div>
</body>
</html>
