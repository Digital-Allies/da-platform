<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Theater - Scroll Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f0f;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .slide.active {
            opacity: 1;
        }

        .slide-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .slide img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover;
        }

        .slide-number {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #14b8a6;
            font-size: 14px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 4px;
            z-index: 100;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        button {
            background: #14b8a6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #0d9488;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: #14b8a6;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            min-width: 180px;
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #14b8a6, #06b6d4);
            width: 0%;
            z-index: 999;
        }

        .keyboard-hint {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: #666;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
        }

        .slide-indicator {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 1000;
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(20, 184, 166, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .dot.active {
            background: #14b8a6;
            transform: scale(1.3);
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>

    <div class="keyboard-hint">Space: Play/Pause | R: Reset | ← →: Navigate</div>

    <div class="container">
        <div class="carousel" id="carousel">
            <div class="slide active">
                <div class="slide-wrapper">
                    <img src="screenshot-1.png" alt="Community Theater - Hero">
                </div>
                <div class="slide-number">1 / 4</div>
            </div>
            <div class="slide">
                <div class="slide-wrapper">
                    <img src="screenshot-2.png" alt="Community Theater - Calendar">
                </div>
                <div class="slide-number">2 / 4</div>
            </div>
            <div class="slide">
                <div class="slide-wrapper">
                    <img src="screenshot-3.png" alt="Community Theater - Events">
                </div>
                <div class="slide-number">3 / 4</div>
            </div>
            <div class="slide">
                <div class="slide-wrapper">
                    <img src="screenshot-4.png" alt="Community Theater - Dashboard">
                </div>
                <div class="slide-number">4 / 4</div>
            </div>
        </div>
    </div>

    <div class="status" id="status">Ready</div>

    <div class="slide-indicator">
        <div class="dot active" id="dot0"></div>
        <div class="dot" id="dot1"></div>
        <div class="dot" id="dot2"></div>
        <div class="dot" id="dot3"></div>
    </div>

    <div class="controls">
        <button id="prevBtn">◀ Prev</button>
        <button id="playBtn">▶ Play</button>
        <button id="resetBtn">⟲ Reset</button>
        <button id="nextBtn">Next ▶</button>
    </div>

    <audio id="audioPlayer" preload="auto">
        <source src="community-theater-audio.mp4" type="audio/mp4">
    </audio>

    <script>
        const carousel = document.getElementById('carousel');
        const slides = carousel.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        const audioPlayer = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const resetBtn = document.getElementById('resetBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const statusDiv = document.getElementById('status');
        const progressBar = document.getElementById('progressBar');

        let isPlaying = false;
        let animationId = null;
        let currentSlide = 0;
        const totalSlides = slides.length;

        const SCROLL_DURATION = 12;
        const SLIDE_TRANSITION_TIME = 3;
        const START_DELAY = 0.5;

        function goToSlide(index) {
            if (index < 0) index = totalSlides - 1;
            if (index >= totalSlides) index = 0;

            slides.forEach(slide => slide.classList.remove('active'));
            dots.forEach(dot => dot.classList.remove('active'));

            slides[index].classList.add('active');
            dots[index].classList.add('active');
            currentSlide = index;
        }

        function updateProgress() {
            if (!isPlaying) return;

            const currentTime = audioPlayer.currentTime;
            const duration = audioPlayer.duration;

            if (isNaN(duration)) {
                statusDiv.textContent = 'Loading audio...';
                animationId = requestAnimationFrame(updateProgress);
                return;
            }

            if (currentTime >= START_DELAY) {
                const scrollTime = currentTime - START_DELAY;
                const slideProgress = scrollTime / SLIDE_TRANSITION_TIME;
                const nextSlide = Math.floor(slideProgress) % totalSlides;

                if (nextSlide !== currentSlide) {
                    goToSlide(nextSlide);
                }
            }

            const barWidth = (currentTime / duration) * 100;
            progressBar.style.width = barWidth + '%';

            statusDiv.innerHTML = `
                <div>${currentTime.toFixed(1)}s / ${duration.toFixed(1)}s</div>
                <div style="font-size: 11px; margin-top: 4px; color: #666;">Slide ${currentSlide + 1}/${totalSlides}</div>
            `;

            if (currentTime < duration) {
                animationId = requestAnimationFrame(updateProgress);
            } else {
                stopPlayback();
            }
        }

        function startPlayback() {
            isPlaying = true;
            playBtn.textContent = '⏸ Pause';
            audioPlayer.play();
            updateProgress();
        }

        function stopPlayback() {
            isPlaying = false;
            playBtn.textContent = '▶ Play';
            audioPlayer.pause();
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
        }

        function reset() {
            stopPlayback();
            audioPlayer.currentTime = 0;
            goToSlide(0);
            progressBar.style.width = '0%';
            statusDiv.textContent = 'Ready';
        }

        playBtn.addEventListener('click', function() {
            if (isPlaying) {
                stopPlayback();
            } else {
                startPlayback();
            }
        });

        resetBtn.addEventListener('click', reset);

        prevBtn.addEventListener('click', function() {
            stopPlayback();
            goToSlide(currentSlide - 1);
        });

        nextBtn.addEventListener('click', function() {
            stopPlayback();
            goToSlide(currentSlide + 1);
        });

        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                playBtn.click();
            } else if (e.code === 'KeyR') {
                resetBtn.click();
            } else if (e.code === 'ArrowLeft') {
                prevBtn.click();
            } else if (e.code === 'ArrowRight') {
                nextBtn.click();
            }
        });

        dots.forEach((dot, index) => {
            dot.addEventListener('click', function() {
                stopPlayback();
                goToSlide(index);
            });
        });

        audioPlayer.addEventListener('loadedmetadata', function() {
            statusDiv.textContent = 'Ready (' + audioPlayer.duration.toFixed(1) + 's)';
        });

        audioPlayer.addEventListener('error', function() {
            statusDiv.textContent = 'Audio load error';
        });

        statusDiv.textContent = 'Loading...';
    </script>
</body>
</html>
