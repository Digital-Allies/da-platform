<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Photography Vibe</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 0; background: transparent; background-image: none; }
    .card { width: 700px; padding: 0; box-sizing: border-box; border: 1px solid var(--charcoal); position: relative; overflow: hidden; }
    .photo { width: 100%; height: 280px; object-fit: cover; display: block; filter: contrast(0.92) saturate(0.85); }
    .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 18px 22px; background: linear-gradient(to top, rgba(45,45,45,0.55), transparent 65%); color: var(--bone-white); }
    .eb { font-family: var(--font-details); font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #FADEEB; margin-bottom: 8px; }
    h2 { font-family: var(--font-headers); font-size: 24px; font-weight: 700; margin: 0; letter-spacing: -0.005em; line-height: 1.15; max-width: 70%; }
    p { font-family: var(--font-details); font-size: 11px; margin: 8px 0 0; max-width: 60%; color: rgba(255,255,255,0.85); line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <img class="photo" src="../assets/photo-kingman-highway.png" alt="Desert highway, Kingman AZ">
    <div class="overlay">
      <span class="eb">Photography vibe</span>
      <h2>Desert beiges, dusk light, no people.</h2>
      <p>Route 66, Kingman highways, museum off-whites. Warm, analog, slightly faded. Pulse Blue and Signal Red are the only colors that appear.</p>
    </div>
  </div>
</body>
</html>
