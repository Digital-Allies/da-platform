<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logo System</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 0; background: transparent; background-image: none; }
    .card { width: 700px; padding: 24px; box-sizing: border-box; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .lbox { border: 1px solid var(--charcoal); display: flex; flex-direction: column; }
    .lbox .img { padding: 16px 18px; display: flex; align-items: center; justify-content: flex-start; min-height: 64px; background: var(--bg); }
    .lbox .img.dark { background: var(--charcoal); }
    .lbox .img img { max-height: 28px; width: auto; object-fit: contain; }
    .lbox .meta { display: flex; justify-content: space-between; padding: 8px 12px; border-top: 1px solid var(--hairline); background: var(--bg); font-family: var(--font-details); font-size: 10px; }
    .meta b { font-family: var(--font-headers); font-weight: 700; }
    .meta span { color: var(--fg-soft); }
    .live { padding: 16px 18px; display: flex; align-items: center; gap: 10px; }
    .wordmark { font-family: var(--font-headers); font-weight: 700; font-size: 16px; letter-spacing: 0.02em; }
  </style>
</head>
<body>
  <div class="card da-lace">
    <div class="grid">
      <div class="lbox">
        <div class="live"><span class="da-pulse-stack"><span class="da-pulse"></span></span><span class="wordmark">Digital Allies</span></div>
        <div class="meta"><b>Pulse lockup (live)</b><span>Primary</span></div>
      </div>
      <div class="lbox">
        <div class="img"><img src="../assets/logo-banner-blue.png" alt=""></div>
        <div class="meta"><b>Banner · blue</b><span>logo-banner-blue.png</span></div>
      </div>
      <div class="lbox">
        <div class="img"><img src="../assets/logo-banner-vermilion.png" alt=""></div>
        <div class="meta"><b>Banner · vermilion</b><span>logo-banner-vermilion.png</span></div>
      </div>
      <div class="lbox">
        <div class="img dark"><img src="../assets/logo-banner-vermilion-glow.png" alt=""></div>
        <div class="meta"><b>Banner · glow on dark</b><span>logo-banner-vermilion-glow.png</span></div>
      </div>
      <div class="lbox">
        <div class="img"><img src="../assets/logo-wordmark.png" alt="" style="max-height:24px"></div>
        <div class="meta"><b>Wordmark only</b><span>logo-wordmark.png</span></div>
      </div>
      <div class="lbox">
        <div class="img" style="justify-content:center"><img src="../assets/favicon.svg" alt="" style="max-height:32px"></div>
        <div class="meta"><b>Favicon · red square</b><span>favicon.svg</span></div>
      </div>
    </div>
  </div>
</body>
</html>
