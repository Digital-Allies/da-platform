<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slide · Title</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="stylesheet" href="./_slide.css">
</head>
<body>
  <div class="slide">
    <div class="slide-header">
      <div class="slide-header__brand">
        <span class="pulse-stack"></span>
        <span class="slide-header__title">Digital Allies · Field Notes</span>
      </div>
      <div class="slide-header__num">
        <span>01 / 12</span>
        <span class="num-box">01</span>
      </div>
    </div>
    <div class="slide-header__rule"></div>

    <div style="position:absolute; top:160px; left:60px; right:60px;">
      <div class="slide-eyebrow" style="margin-bottom:24px">Based in Kingman, AZ · Serving Everywhere Else</div>
      <h1 class="slide-display" style="max-width: 1000px;">
        Technological Solutions for People with Better Things to Do.
      </h1>
      <p class="slide-sub" style="margin-top:32px; max-width:720px;">
        I build systems that don't require a master's degree to operate.
      </p>
    </div>

    <!-- Decorative line illustration: bridge -->
    <img src="../assets/suspension-bridge.svg" alt=""
         style="position:absolute; right:60px; bottom:96px; width:280px; opacity:0.5;
                filter: brightness(0) invert(1) brightness(0.7);">

    <div class="slide-footer">
      <span class="slide-footer__brand">Digital Allies</span>
      <span class="slide-footer__meta">
        <span>contact@digitalallies.net</span>
        <span class="sep">·</span>
        <span>digitalallies.net</span>
        <span class="sep">·</span>
        <span>(928) 228-5769</span>
      </span>
    </div>
  </div>
</body>
</html>
