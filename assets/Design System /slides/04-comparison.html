<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slide · Comparison</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="stylesheet" href="./_slide.css">
</head>
<body>
  <div class="slide">
    <div class="slide-header">
      <div class="slide-header__brand">
        <span class="pulse-stack"></span>
        <span class="slide-header__title">Digital Allies · Field Notes</span>
      </div>
      <div class="slide-header__num">
        <span>04 / 12</span>
        <span class="num-box">04</span>
      </div>
    </div>
    <div class="slide-header__rule"></div>

    <div style="position:absolute; top:130px; left:60px; right:60px;">
      <div class="slide-eyebrow" style="margin-bottom:18px">The Jargon Jar 2.0</div>
      <h1 class="slide-display" style="font-size:64px; max-width:900px;">
        Translate corporate posture into straight talk.
      </h1>
    </div>

    <div style="position:absolute; top:340px; left:60px; right:60px; bottom:96px;
                display:grid; grid-template-columns: 1fr 80px 1fr; gap:0; align-items:stretch;">
      <div style="border:1px solid rgba(249,246,240,0.3); padding:40px 36px; display:flex; flex-direction:column;">
        <div style="font-family:var(--font-details); font-size:13px; font-weight:700;
                    letter-spacing:0.22em; text-transform:uppercase; color:var(--signal-red); margin-bottom:18px;">
          Corporate Speak
        </div>
        <div style="font-family:var(--font-headers); font-weight:600; font-size:30px; line-height:1.25;
                    color:rgba(249,246,240,0.55); text-decoration: line-through;
                    text-decoration-color: rgba(249,246,240,0.3);">
          "Leverage synergies across touchpoints"
        </div>
      </div>
      <div style="display:flex; align-items:center; justify-content:center;
                  font-family: var(--font-details); font-weight:700; font-size:40px; color:var(--signal-red);">
        →
      </div>
      <div class="slide-card" style="display:flex; flex-direction:column;">
        <div class="slide-card__label">DA Translation</div>
        <div style="font-family:var(--font-headers); font-weight:700; font-size:32px; line-height:1.2;
                    color:var(--bone-white);">
          "Make the parts work together."
        </div>
      </div>
    </div>

    <div class="slide-footer">
      <span class="slide-footer__brand">Digital Allies</span>
      <span class="slide-footer__meta">
        <span>If you need a glossary to read your website, you've already lost them.</span>
      </span>
    </div>
  </div>
</body>
</html>
