<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slide · End Card</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="stylesheet" href="./_slide.css">
</head>
<body>
  <div class="slide">
    <div class="slide-header">
      <div class="slide-header__brand">
        <span class="pulse-stack"></span>
        <span class="slide-header__title">Digital Allies · Field Notes</span>
      </div>
      <div class="slide-header__num">
        <span>END · 12 / 12</span>
        <span class="num-box">12</span>
      </div>
    </div>
    <div class="slide-header__rule"></div>

    <div style="position:absolute; top:0; left:0; right:0; bottom:0;
                display:flex; flex-direction:column; align-items:center; justify-content:center;
                text-align:center; padding: 0 60px;">

      <div style="position:relative; display:inline-flex; align-items:center; justify-content:center;
                  width:88px; height:88px; margin-bottom:32px;">
        <span style="position:absolute; width:64px; height:64px; background:var(--pulse-blue);
                     border-radius:50%; opacity:0.18;
                     animation: da-fab-ring 2.2s ease-out infinite;"></span>
        <span style="position:relative; width:36px; height:36px; background:var(--pulse-blue);
                     border:2px solid var(--bone-white); border-radius:50%;
                     animation: da-brand-pulse 3s ease-in-out infinite;"></span>
      </div>

      <div class="slide-eyebrow" style="margin-bottom:18px">Need a strategic ally?</div>
      <h1 class="slide-display" style="font-size:88px; max-width: 900px;">
        Tell me what you are trying to do.
      </h1>
      <p class="slide-sub" style="margin-top:28px; max-width:720px;">
        I will reply with next steps, a cost range, or a quick question.
        Usually all three.
      </p>

      <div style="display:flex; gap:48px; margin-top:60px;
                  font-family: var(--font-details); font-size:18px; letter-spacing:0.06em;">
        <div>
          <div style="color:var(--signal-red); font-size:12px; font-weight:700;
                      letter-spacing:0.22em; text-transform:uppercase; margin-bottom:6px;">
            Direct Line
          </div>
          <div style="font-family: var(--font-headers); font-weight:700; font-size:24px;">
            (928) 228-5769
          </div>
        </div>
        <div style="width:1px; background:rgba(249,246,240,0.2)"></div>
        <div>
          <div style="color:var(--signal-red); font-size:12px; font-weight:700;
                      letter-spacing:0.22em; text-transform:uppercase; margin-bottom:6px;">
            Email
          </div>
          <div style="font-family: var(--font-headers); font-weight:700; font-size:24px;">
            contact@digitalallies.net
          </div>
        </div>
      </div>
    </div>

    <div class="slide-footer">
      <span class="slide-footer__brand">Digital Allies</span>
      <span class="slide-footer__meta">
        <span>© 2026 · Kingman, AZ</span>
      </span>
    </div>
  </div>
</body>
</html>
