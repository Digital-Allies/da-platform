<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Buttons</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 0; background: transparent; background-image: none; }
    .card { width: 700px; padding: 28px 24px; box-sizing: border-box; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px 14px; align-items: start; }
    .col { display: flex; flex-direction: column; gap: 10px; }
    .tag { font-family: var(--font-details); font-size: 9px; color: var(--fg-soft); text-transform: uppercase; letter-spacing: 0.18em; }
    .btn { font-family: var(--font-headers); font-weight: 700; font-size: 13px; padding: 12px 24px; border: 1px solid var(--charcoal); cursor: default; display: inline-block; text-align: center; }
    .btn-primary { background: var(--signal); color: #fff; }
    .btn-secondary { background: var(--bone-white); color: var(--fg); }
    .btn-dark { background: var(--charcoal); color: var(--bone-white); }
    .btn-hover { background: var(--accent-soft); color: var(--fg); }
    .btn-invert { background: var(--charcoal); color: var(--bone-white); }
    .btn-disabled { background: var(--bone-white); color: var(--fg-soft); border-color: var(--hairline); }
    .btn-small { font-size: 11px; padding: 8px 16px; }
    .btn-link { background: transparent; border: none; color: var(--accent); padding: 4px 0; border-bottom: 1px solid var(--accent); }
  </style>
</head>
<body>
  <div class="card da-lace">
    <div class="grid">
      <div class="col"><span class="tag">Primary · CTA</span><span class="btn btn-primary">[ Inquire Within ]</span></div>
      <div class="col"><span class="tag">Secondary</span><span class="btn btn-secondary">[ View the Diagrams ]</span></div>
      <div class="col"><span class="tag">Dark · Download</span><span class="btn btn-dark">Download PDF</span></div>
      <div class="col"><span class="tag">Hover wash</span><span class="btn btn-hover">[ Inquire Within ]</span></div>
      <div class="col"><span class="tag">Pressed · invert</span><span class="btn btn-invert">[ View the Diagrams ]</span></div>
      <div class="col"><span class="tag">Disabled</span><span class="btn btn-disabled">[ Not Available ]</span></div>
      <div class="col"><span class="tag">Small · pill row</span><span class="btn btn-secondary btn-small">Show All</span></div>
      <div class="col"><span class="tag">Small · active</span><span class="btn btn-dark btn-small">Show All</span></div>
      <div class="col"><span class="tag">Inline link</span><a class="btn-link">View the FAQ →</a></div>
    </div>
  </div>
</body>
</html>
