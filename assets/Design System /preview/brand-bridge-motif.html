<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Suspension Bridge Motif</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 0; background: transparent; background-image: none; }
    .card { width: 700px; padding: 24px; box-sizing: border-box; display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; align-items: center; }
    .img { background: var(--bg-alt); border: 1px solid var(--charcoal); padding: 18px; display: flex; align-items: center; justify-content: center; }
    .img img { width: 100%; max-width: 280px; height: auto; }
    .right { font-family: var(--font-body); font-size: 11px; line-height: 1.65; }
    .right h3 { font-family: var(--font-headers); font-weight: 700; font-size: 16px; margin: 0 0 6px; }
    .right .eb { font-family: var(--font-details); font-size: 9px; color: var(--signal); font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 8px; display: block; }
    .right p { margin: 0 0 8px; color: var(--fg-muted); }
    .right p i { color: var(--fg); font-style: italic; }
  </style>
</head>
<body>
  <div class="card">
    <div class="img"><img src="../assets/suspension-bridge.svg" alt="Suspension bridge"></div>
    <div class="right">
      <span class="eb">The mission motif</span>
      <h3>Technology as a bridge</h3>
      <p>The suspension bridge is the brand's literal manifesto:
      <i>"good technology connects people to opportunity."</i></p>
      <p>Use on About / mission pages, year-end posts, manifesto banners. Never alongside red signal dots in the same eyeline.</p>
    </div>
  </div>
</body>
</html>
