<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Accordion (Diagrams)</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 0; background: transparent; background-image: none; }
    .card { width: 700px; padding: 24px; box-sizing: border-box; }
    .item { border: 1px solid var(--charcoal); background: var(--bg); margin-bottom: 10px; }
    .item:last-child { margin-bottom: 0; }
    .head { padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; font-family: var(--font-headers); font-weight: 700; font-size: 14px; cursor: default; }
    .head .plus { color: var(--accent); font-size: 22px; line-height: 1; transition: transform 0.3s; font-family: var(--font-details); }
    .item.open .head { background: var(--accent-soft); border-bottom: 1px solid var(--hairline); }
    .item.open .plus { transform: rotate(45deg); }
    .body { padding: 14px 18px; border-top: 1px solid var(--hairline); font-family: var(--font-details); font-size: 11px; line-height: 1.6; color: var(--fg-muted); }
    .body strong { font-family: var(--font-headers); font-weight: 600; color: var(--fg); }
  </style>
</head>
<body>
  <div class="card da-lace">
    <div class="item open">
      <div class="head"><span>AEO &amp; SEO Architecture</span><span class="plus">+</span></div>
      <div class="body">Getting found by search engines is a structural problem. I review the foundation and fix the parts that keep you invisible. <strong>Discover → Design → Build → Maintain.</strong></div>
    </div>
    <div class="item">
      <div class="head"><span>The Four-Step Process</span><span class="plus">+</span></div>
    </div>
    <div class="item">
      <div class="head"><span>Language &amp; Accessibility Architecture</span><span class="plus">+</span></div>
    </div>
  </div>
</body>
</html>
