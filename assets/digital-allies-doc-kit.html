<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Allies Document Kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&family=Lexend+Deca:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #2A8FD4;
      --blue-dark: #1a6faa;
      --ink: #2B2F36;
      --grey: #8A8A8A;
      --offwhite: #F7F8FA;
      --dot: #D8D5CE;
      --line: #e8e8e8;
      --paper: #ffffff;
      --shadow: 0 8px 36px rgba(0,0,0,.08);
      --radius: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--offwhite);
      color: var(--ink);
    }
    .app {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--ink);
      color: white;
      padding: 18px 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #3a3f48;
    }
    .sidebar-logo {
      padding: 0 18px 16px;
      border-bottom: 1px solid #3a3f48;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .da-mark {
      width: 38px;
      height: 38px;
      flex: 0 0 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .da-mark svg { width: 100%; height: 100%; display: block; }
    .sidebar-logo-name {
      font-family: 'Figtree', sans-serif;
      font-size: 15px;
      font-weight: 900;
      line-height: 1.05;
    }
    .sidebar-logo-sub {
      color: #97a0ad;
      font-size: 9px;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-top: 3px;
    }
    .sidebar-nav {
      padding-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .nav-item {
      border: none;
      background: transparent;
      color: #cdd4dd;
      text-align: left;
      padding: 11px 18px;
      font: 500 11px 'JetBrains Mono', monospace;
      letter-spacing: .04em;
      text-transform: uppercase;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .nav-item:hover,
    .nav-item.active {
      background: #323740;
      color: white;
      border-left-color: var(--blue);
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .toolbar {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .toolbar-title {
      font-family: 'Lexend Deca', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .toolbar-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      border: none;
      border-radius: 5px;
      padding: 10px 14px;
      cursor: pointer;
      font: 600 11px 'JetBrains Mono', monospace;
      letter-spacing: .04em;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary { background: var(--blue); color: white; }
    .btn-primary:hover { background: var(--blue-dark); }
    .btn-ghost { background: transparent; color: var(--grey); border: 1.5px solid #ddd; }
    .btn-ghost:hover { color: var(--blue); border-color: var(--blue); }
    .doc-wrap {
      padding: 32px 24px;
      display: flex;
      justify-content: center;
      overflow: auto;
    }
    .doc-page {
      width: 100%;
      max-width: 816px;
      min-height: 1056px;
      background: var(--paper);
      position: relative;
      box-shadow: var(--shadow);
      border-radius: 4px;
      padding: 40px 44px 48px;
    }
    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: var(--blue);
      border-radius: 4px 4px 0 0;
    }
    .bottom-bar {
      margin-top: 32px;
      height: 3px;
      background: var(--blue);
      border-radius: 0 0 2px 2px;
    }
    .dot-pattern {
      position: absolute;
      top: 0;
      right: 0;
      width: 160px;
      height: 140px;
      opacity: .5;
      border-radius: 0 4px 0 0;
      background-image: radial-gradient(var(--dot) 1.5px, transparent 1.5px);
      background-size: 10px 10px;
      pointer-events: none;
    }
    .doc-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 28px;
    }
    .logo-block {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex-wrap: nowrap;
    }
    .logo-name {
      font-family: 'Figtree', sans-serif;
      font-weight: 900;
      font-size: 19px;
      line-height: 1.1;
      letter-spacing: -.01em;
    }
    .logo-name .blue { color: var(--blue); }
    .doc-site {
      font-size: 10px;
      color: var(--grey);
      letter-spacing: .06em;
      margin-top: 2px;
    }
    .doc-title-block { text-align: right; }
    .doc-type {
      font-family: 'Lexend Deca', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: .02em;
      line-height: 1;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .field-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--grey);
      letter-spacing: .07em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .field-input,
    .static-line {
      border: none;
      border-bottom: 1px solid #e0e0e0;
      padding: 5px 0;
      font-size: 12px;
      color: var(--ink);
      background: transparent;
      font-family: 'JetBrains Mono', monospace;
      width: 100%;
      min-height: 24px;
    }
    .static-line {
      display: flex;
      align-items: center;
    }
    .field-textarea {
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 10px;
      font-size: 12px;
      min-height: 76px;
      line-height: 1.65;
      white-space: pre-wrap;
    }
    .section { margin-bottom: 24px; }
    .section-title {
      font-family: 'Lexend Deca', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1.5px solid var(--blue);
    }
    .field-row {
      display: flex;
      gap: 16px;
      margin-bottom: 10px;
    }
    .field-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .doc-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .doc-table thead tr {
      background: var(--blue);
      color: white;
    }
    .doc-table th {
      padding: 9px 12px;
      text-align: left;
      font: 700 10px 'Lexend Deca', sans-serif;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .doc-table td {
      padding: 8px 12px;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }
    .text-right { text-align: right; }
    .text-center { text-align: center; }
    .totals-block {
      width: 240px;
      margin-left: auto;
      margin-top: 16px;
    }
    .total-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      font-size: 12px;
    }
    .tl-label { color: var(--grey); font-weight: 600; }
    .total-final {
      margin-top: 8px;
      background: var(--blue);
      color: white;
      border-radius: 4px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font: 700 13px 'Lexend Deca', sans-serif;
    }
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .party-title {
      font: 700 10px 'Lexend Deca', sans-serif;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .bullet-line,
    .step-line,
    .agenda-line {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .bullet-dash {
      color: var(--blue);
      font-weight: 700;
      font-size: 16px;
      line-height: 1;
    }
    .badge-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--blue);
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font: 700 10px 'Lexend Deca', sans-serif;
      flex: 0 0 22px;
    }
    .section-num {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1.5px solid var(--blue);
    }
    .section-num .section-title {
      margin: 0;
      padding: 0;
      border: none;
    }
    .cover-center {
      min-height: 430px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .cover-rule {
      width: 100%;
      height: 2px;
      background: var(--blue);
      margin: 18px 0;
      max-width: 440px;
    }
    .cover-title {
      font: 800 60px 'Lexend Deca', sans-serif;
      line-height: 1;
      letter-spacing: .02em;
      margin: 16px 0 32px;
    }
    .cover-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin: 6px 0;
      font-size: 13px;
      flex-wrap: wrap;
    }
    .welcome-big {
      font: 900 46px 'Figtree', sans-serif;
      line-height: 1;
      letter-spacing: -.02em;
      margin-bottom: 6px;
    }
    .welcome-sub {
      font-size: 12px;
      color: var(--grey);
      margin-bottom: 20px;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .checkbox {
      width: 14px;
      height: 14px;
      border: 1.5px solid var(--blue);
      border-radius: 3px;
      background: linear-gradient(135deg, var(--blue) 0 100%);
      box-shadow: inset 0 0 0 2px white;
      flex: 0 0 14px;
    }
    .footer-bar {
      text-align: center;
      margin-top: 28px;
      padding-top: 16px;
      border-top: 1px solid #eee;
      font-size: 10px;
      color: var(--grey);
      letter-spacing: .06em;
    }
    .thank-you {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 20px 0 0;
      font: 700 18px 'Lexend Deca', sans-serif;
      color: var(--blue);
      text-align: center;
    }
    .amount-paid-block {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
    }
    .amount-paid {
      background: var(--blue);
      color: white;
      border-radius: 4px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      font: 700 12px 'Lexend Deca', sans-serif;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .amount-paid strong { font-size: 18px; }
    .sig-box {
      height: 40px;
      border-bottom: 1px solid #e0e0e0;
    }
    .hidden { display: none !important; }
    @media (max-width: 980px) {
      .app { flex-direction: column; }
      .sidebar { width: 100%; min-width: 0; }
      .sidebar-nav { flex-direction: row; flex-wrap: wrap; padding: 12px; }
      .nav-item { border-left: none; border-bottom: 3px solid transparent; }
      .nav-item:hover, .nav-item.active { border-left-color: transparent; border-bottom-color: var(--blue); }
      .doc-page { min-height: auto; }
      .field-row, .two-col, .doc-header { display: block; }
      .doc-title-block { text-align: left; margin-top: 20px; }
      .totals-block { width: 100%; }
    }
    @media print {
      body { background: white; }
      .sidebar, .toolbar { display: none !important; }
      .doc-wrap { padding: 0; overflow: visible; }
      .doc-page {
        max-width: none;
        width: auto;
        box-shadow: none;
        border-radius: 0;
        min-height: auto;
      }
      @page { size: letter; margin: 0.45in; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="da-mark" aria-hidden="true">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
            <text x="2" y="78" font-family="Figtree, sans-serif" font-weight="900" font-size="72" fill="#2B2F36" letter-spacing="-7" lengthAdjust="spacingAndGlyphs" textLength="86">DA</text>
            <circle cx="88" cy="18" r="10" fill="#2A8FD4" />
          </svg>
        </div>
        <div>
          <div class="sidebar-logo-name">Digital Allies</div>
          <div class="sidebar-logo-sub">Document Kit</div>
        </div>
      </div>
      <nav class="sidebar-nav" id="docNav"></nav>
    </aside>

    <main class="main">
      <div class="toolbar">
        <div class="toolbar-title" id="toolbarTitle">Estimate</div>
        <div class="toolbar-actions">
          <button class="btn btn-ghost" id="printBtn">Print / Save PDF</button>
          <button class="btn btn-primary" id="downloadBtn">Download This PDF</button>

      </div>
      <div class="doc-wrap">
        <div id="docMount"></div>

  </div>

  <template id="sharedLogo">
    <div class="logo-block">
      <div class="da-mark" aria-hidden="true" style="width:42px;height:42px;flex-basis:42px;">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
          <text x="2" y="78" font-family="Figtree, sans-serif" font-weight="900" font-size="72" fill="#2B2F36" letter-spacing="-7" lengthAdjust="spacingAndGlyphs" textLength="86">DA</text>
          <circle cx="88" cy="18" r="10" fill="#2A8FD4" />
        </svg>
      </div>
      <div>
        <div class="logo-name">Digital <span class="blue">Allies</span></div>
        <div class="doc-site">digitalallies.net</div>
      </div>

  <script>
    const logo = () => document.getElementById('sharedLogo').innerHTML;

    const docs = [
      {
        id: 'estimate',
        label: 'Estimate',
        html: `

              </div>

                <div class="field-group"><span class="field-label">Email</span><div class="static-line">hello@digitalallies.net</div></div>

              </div>
            </section>
            <section class="section">
              <div class="section-title">Project Description</div>
              <div class="field-textarea">Recreated Digital Allies branded document kit with corrected monogram sizing, editable layout styling, and PDF-ready export structure.</div>
            </section>
            <section class="section">
              <div class="section-title">Line Items</div>
              <table class="doc-table">
                <thead><tr><th style="width:50%;">Description</th><th>Hours</th><th>Rate</th><th>Amount</th></tr></thead>

                  <tr><td>Document system rebuild</td><td class="text-center">6</td><td class="text-right">$125.00</td><td class="text-right">$750.00</td></tr>
                  <tr><td>Brand monogram fit correction</td><td class="text-center">2</td><td class="text-right">$125.00</td><td class="text-right">$250.00</td></tr>

              </div>
            </section>
            <div style="font-size:11px;color:var(--grey);line-height:1.8;">
              <div>This estimate is valid until the date listed above.</div>
              <div>Questions? Please don't hesitate to reach out.</div>
              <div>We look forward to working with you.</div>
            </div>
            <div class="bottom-bar"></div>
          </article>`
      },
      {
        id: 'proposal',
        label: 'Proposal',
        html: `
          <article class="doc-page" data-doc-title="Proposal">
            <div class="top-bar"></div><div class="dot-pattern"></div>
            <div class="cover-center">
              <div class="da-mark" aria-hidden="true" style="width:80px;height:80px;flex-basis:80px;">

              </div>

              <div class="cover-meta" style="color:var(--grey);"><span>Prepared by</span><strong>Digital Allies</strong></div>
              <div class="cover-meta"><span>Date</span><div class="static-line" style="min-width:180px;justify-content:center;">05 / 18 / 2026</div></div>
              <div class="cover-rule" style="margin-top:32px;"></div>
            </div>
          </article>`
      },
      {
        id: 'project-brief',
        label: 'Project Brief',
        html: `
          <article class="doc-page" data-doc-title="Project Brief">
            <div class="top-bar"></div><div class="dot-pattern"></div>
            <div class="doc-header">
              ${logo()}
              <div class="doc-title-block">
                <div class="doc-type">PROJECT BRIEF</div>
                <div class="meta-item"><span class="field-label">Date</span><div class="static-line" style="width:130px;">05 / 18 / 2026</div></div>
              </div>
            </div>
            <section class="section"><div class="section-title">Project Overview</div><div class="field-textarea">Build a reusable Digital Allies document system for proposals, agreements, receipts, notes, and onboarding with consistent branding and PDF-friendly formatting.</div></section>

              <div class="bullet-line"><span class="bullet-dash">—</span><div class="static-line">Keep the identity clean and recognizable.</div></div>

              <div class="bullet-line"><span class="bullet-dash">—</span><div class="static-line">Maintain a polished client-facing presentation.</div></div>
            </section>
            <section class="section">
              <div class="section-title">Scope</div>
              <div class="bullet-line"><span class="bullet-dash">—</span><div class="static-line">Estimate template</div></div>
              <div class="bullet-line"><span class="bullet-dash">—</span><div class="static-line">Proposal cover page</div></div>
              <div class="bullet-line"><span class="bullet-dash">—</span><div class="static-line">Agreement, receipt, onboarding, and notes templates</div></div>
              <div class="bullet-line"><span class="bullet-dash">—</span><div class="static-line">Single HTML launcher with PDF download workflow</div></div>
            </section>
            <section class="section">
              <div class="section-title">Timeline</div>
              <table class="doc-table">
                <thead><tr><th>Phase</th><th>Start</th><th>End</th><th>Status</th></tr></thead>
                <tbody>

    const nav = document.getElementById('docNav');
    const mount = document.getElementById('docMount');
    const title = document.getElementById('toolbarTitle');
    const printBtn = document.getElementById('printBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    let activeId = docs[0].id;

    function renderNav() {
      nav.innerHTML = docs.map(doc => `
        <button class="nav-item ${doc.id === activeId ? 'active' : ''}" data-id="${doc.id}">${doc.label}</button>
      `).join('');
      nav.querySelectorAll('[data-id]').forEach(btn => {
        btn.addEventListener('click', () => {
          activeId = btn.dataset.id;
          render();
        });
      });
    }

    function render() {
      const doc = docs.find(d => d.id === activeId);
      mount.innerHTML = doc.html;
      title.textContent = doc.label;
      renderNav();
    }

    function openPrintWindow() {
      const doc = docs.find(d => d.id === activeId);
      const page = mount.querySelector('.doc-page');
      const styles = Array.from(document.querySelectorAll('style')).map(s => s.outerHTML).join('');
      const links = Array.from(document.querySelectorAll('link[rel="preconnect"], link[rel="stylesheet"]')).map(l => l.outerHTML).join('');
      const win = window.open('', '_blank');
      win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${doc.label} - Digital Allies</title>${links}${styles}</head><body>${page.outerHTML}</body></html>`);
      win.document.close();
      win.focus();
      setTimeout(() => win.print(), 500);
    }

    printBtn.addEventListener('click', openPrintWindow);
    downloadBtn.addEventListener('click', openPrintWindow);

    render();
  </script>
