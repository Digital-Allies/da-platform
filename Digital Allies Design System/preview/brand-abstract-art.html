<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Abstract Brand Art" subtitle="Wavy-line banners + luminous-blue-dot tiles" viewport="700x380" -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Abstract Brand Art</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 0; background: transparent; background-image: none; }
    .card { width: 700px; padding: 24px; box-sizing: border-box; }
    .label { font-family: var(--font-details); font-size: 9px; color: var(--fg-soft); text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 12px; display: block; }
    .banner { width: 100%; height: 130px; object-fit: cover; border: 1px solid var(--charcoal); display: block; margin-bottom: 10px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row .sq { width: 100%; aspect-ratio: 1/1; object-fit: cover; border: 1px solid var(--charcoal); }
    .row .sq.tall { aspect-ratio: 16/10; }
    .foot { font-family: var(--font-details); font-size: 10px; color: var(--fg-muted); line-height: 1.5; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <span class="label">Abstract art — thin wavy lines + luminous blue dot</span>
    <img class="banner" src="../assets/brand-art-banner-lines.png" alt="">
    <div class="row">
      <img class="sq tall" src="../assets/brand-art-dot-square.png" alt="">
      <img class="sq tall" src="../assets/brand-art-dot-glow.png" alt="">
    </div>
    <p class="foot">Used as full-bleed hero overlays, blog headers, and social tiles. Black + Pulse Blue only.</p>
  </div>
</body>
</html>
