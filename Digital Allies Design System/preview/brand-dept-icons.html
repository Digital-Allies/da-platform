<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Department Badges" subtitle="Circular badge variants for the four departments" viewport="700x220" -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Department Icons</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 0; background: transparent; background-image: none; }
    .card { width: 700px; padding: 24px; box-sizing: border-box; }
    .label { font-family: var(--font-details); font-size: 9px; color: var(--fg-soft); text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 12px; display: block; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .ic { border: 1px solid var(--charcoal); padding: 12px; background: var(--bg); display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .ic img { width: 80px; height: 80px; object-fit: contain; background: transparent; }
    .ic .name { font-family: var(--font-headers); font-weight: 700; font-size: 11px; text-align: center; line-height: 1.3; }
    .ic .eb { font-family: var(--font-details); font-size: 8px; color: var(--signal); font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="card da-lace">
    <span class="label">Department badges — used in the four-card services grid</span>
    <div class="grid">
      <div class="ic"><img src="../assets/design-icon.png" alt=""><span class="name">The Design Bureau</span><span class="eb">Design</span></div>
      <div class="ic"><img src="../assets/integrations-icon.png" alt=""><span class="name">Dept. of Cooperation</span><span class="eb">Integrations</span></div>
      <div class="ic"><img src="../assets/automation-icon.png" alt=""><span class="name">Self-Governing Bureau</span><span class="eb">Automation</span></div>
      <div class="ic"><img src="../assets/support-icon.png" alt=""><span class="name">Observation Post</span><span class="eb">Support</span></div>
    </div>
  </div>
</body>
</html>
