<!DOCTYPE html>
<!-- @dsCard group="Slides" name="Slide · Section Header" subtitle="Giant number block + two-line accented headline" viewport="1280x720" -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slide · Section</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="stylesheet" href="./_slide.css">
</head>
<body>
  <div class="slide">
    <div class="slide-header">
      <div class="slide-header__brand">
        <span class="pulse-stack"></span>
        <span class="slide-header__title">Digital Allies · Field Notes</span>
      </div>
      <div class="slide-header__num">
        <span>SECTION 02 OF 04</span>
        <span class="num-box">02</span>
      </div>
    </div>
    <div class="slide-header__rule"></div>

    <!-- Giant section number on left -->
    <div style="position:absolute; top:160px; left:60px; bottom:120px; width:380px;
                display:flex; align-items:center; justify-content:center;
                border: 1px solid rgba(249,246,240,0.15);">
      <div style="text-align:center;">
        <div style="font-family: var(--font-details); font-size:18px; font-weight:700;
                    letter-spacing:0.25em; color:var(--signal-red); margin-bottom:24px;">
          PART TWO
        </div>
        <div style="font-family: var(--font-headers); font-weight:700; font-size:240px;
                    line-height:1; letter-spacing:-0.03em; color:var(--bone-white);">
          02
        </div>
      </div>
    </div>

    <!-- Section title on right -->
    <div style="position:absolute; top:160px; left:500px; right:60px; bottom:120px;
                display:flex; flex-direction:column; justify-content:center;">
      <div class="slide-eyebrow" style="margin-bottom:18px">The Departments</div>
      <h1 class="slide-display" style="font-size: 88px;">
        Four distinct operations.
      </h1>
      <h1 class="slide-display" style="font-size: 88px; color: var(--pulse-blue);">
        One point of contact.
      </h1>
      <p class="slide-sub" style="margin-top:32px">
        Design · Integrations · Automation · Support
      </p>
    </div>

    <div class="slide-footer">
      <span class="slide-footer__brand">Digital Allies</span>
      <span class="slide-footer__meta">
        <span>digitalallies.net</span>
        <span class="sep">·</span>
        <span>Kingman, AZ</span>
      </span>
    </div>
  </div>
</body>
</html>
