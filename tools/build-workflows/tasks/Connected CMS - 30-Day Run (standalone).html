  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Connected CMS — The 30-Day Run<\u002Ftitle>\n<style>/* ============================================================\n   Digital Allies — Colors & Type Foundation\n   \"Technological Solutions for People with Better Things to Do.\"\n\n   95/5 Color Rule: 95% neutral canvas + 5% high-signal accents.\n   Typography: Lexend Deca (headers) + JetBrains Mono (body/details).\n   ============================================================ */\n\n/* ----------------------------------------------------------\n   Local variable fonts (preferred). Anything that imports\n   colors_and_type.css picks them up automatically. Google\n   Fonts remains a network fallback below so demo pages still\n   work without the local files.\n   ---------------------------------------------------------- */\n@font-face {\n  font-family: \"Lexend Deca\";\n  src: url(\"47197386-bfb6-474f-9205-7c23fcccbf34\") format(\"truetype-variations\"),\n       url(\"47197386-bfb6-474f-9205-7c23fcccbf34\") format(\"truetype\");\n  font-weight: 100 900;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"JetBrains Mono\";\n  src: url(\"7506affb-2aa7-4ef6-94ad-64425cf6e79a\") format(\"truetype-variations\"),\n       url(\"7506affb-2aa7-4ef6-94ad-64425cf6e79a\") format(\"truetype\");\n  font-weight: 100 800;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"JetBrains Mono\";\n  src: url(\"350a76c9-44c1-458c-b011-4627f237247f\") format(\"truetype-variations\"),\n       url(\"350a76c9-44c1-458c-b011-4627f237247f\") format(\"truetype\");\n  font-weight: 100 800;\n  font-style: italic;\n  font-display: swap;\n}\n\n/* All weights are now served from local files. No network fonts needed. */\n\n:root {\n  /* --------------------------------------------------------\n     CORE PALETTE — the 5 anchor colors. Nothing else.\n     -------------------------------------------------------- */\n  --bone-white:    #F9F6F0;   /* Canvas. Soft, analog. */\n  --charcoal:      #2D2D2D;   /* Structure. Borders & text. */\n  --pulse-blue:    #3A7BD5;   /* Live connection. Action. */\n  --light-pink:    #FADEEB;   /* Subtle accent / hover wash. */\n  --signal-red:    #C5301A;   /* \"Anderson Vermillion\" — POI cue. */\n  --pinned-note:   #FCFAED;   /* Pinned-note yellow (functional accent). */\n\n  /* --------------------------------------------------------\n     NEUTRAL SUPPORTING TINTS (use sparingly)\n     -------------------------------------------------------- */\n  --grid-line:     rgba(45, 45, 45, 0.07);   /* Technical Lace bg grid */\n  --grid-line-strong: rgba(45, 45, 45, 0.18);\n  --hairline:      rgba(45, 45, 45, 0.15);   /* dividers inside cards */\n  --text-muted:    #6b6b6b;\n  --text-soft:     #888888;\n  --field-border:  #E0DDD5;                  /* per blueprint */\n\n  /* --------------------------------------------------------\n     SEMANTIC FOREGROUND / BACKGROUND\n     -------------------------------------------------------- */\n  --bg:            var(--bone-white);\n  --bg-alt:        var(--pinned-note);\n  --fg:            var(--charcoal);\n  --fg-muted:      var(--text-muted);\n  --fg-soft:       var(--text-soft);\n  --fg-on-dark:    var(--bone-white);\n\n  --border:        var(--charcoal);          /* the \"structural border\" */\n  --border-soft:   var(--hairline);\n\n  --accent:        var(--pulse-blue);        /* live / link */\n  --accent-soft:   var(--light-pink);\n  --signal:        var(--signal-red);        /* attention only */\n\n  /* --------------------------------------------------------\n     TYPE FAMILIES\n     -------------------------------------------------------- */\n  --font-headers: \"Lexend Deca\", system-ui, sans-serif;\n  --font-details: \"JetBrains Mono\", ui-monospace, \"SFMono-Regular\", Menlo, monospace;\n  --font-body:    \"JetBrains Mono\", ui-monospace, \"SFMono-Regular\", Menlo, monospace;\n\n  /* --------------------------------------------------------\n     TYPE SCALE — uses Lexend Deca for h1-h4, mono for body.\n     -------------------------------------------------------- */\n  --fs-display:  clamp(40px, 5.5vw, 64px);   /* hero / page title */\n  --fs-h1:       clamp(32px, 3.2vw, 40px);\n  --fs-h2:       clamp(24px, 2.4vw, 30px);\n  --fs-h3:       18px;\n  --fs-h4:       14px;\n  --fs-body:     14px;\n  --fs-small:    12px;\n  --fs-micro:    10px;     /* uppercase tracked labels */\n  --fs-nano:      9px;     /* eyebrow tags */\n\n  --lh-tight:    1.1;\n  --lh-snug:     1.25;\n  --lh-normal:   1.55;\n  --lh-relaxed:  1.7;\n\n  --tracking-wide:    0.02em;\n  --tracking-wider:   0.08em;\n  --tracking-widest:  0.18em;   /* eyebrows */\n\n  /* --------------------------------------------------------\n     SPACING — 20px Technical Lace baseline (4px sub-unit)\n     -------------------------------------------------------- */\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;   /* one grid unit */\n  --space-6:  24px;\n  --space-8:  32px;\n  --space-10: 40px;   /* two grid units */\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;   /* \"extreme whitespace\" */\n  --space-24: 96px;\n\n  /* --------------------------------------------------------\n     STRUCTURAL BORDERS & SHAPES\n     The brand is corner-square. Radius is minimal & functional.\n     -------------------------------------------------------- */\n  --border-1: 1px solid var(--charcoal);\n  --border-hairline: 1px solid var(--hairline);\n  --border-dashed: 1px dashed var(--grid-line-strong);\n\n  --radius-0: 0;        /* primary — corners are square */\n  --radius-1: 2px;      /* form fields only */\n  --radius-pill: 999px; /* pulse dot + signal dots */\n\n  /* --------------------------------------------------------\n     SHADOWS — used sparingly. The grid does the work.\n     -------------------------------------------------------- */\n  --shadow-sm:  0 1px 2px rgba(45, 45, 45, 0.04);\n  --shadow-md:  0 6px 12px rgba(45, 45, 45, 0.06);\n  --shadow-lg:  0 16px 32px rgba(45, 45, 45, 0.08);\n  --shadow-pin: 0 2px 4px rgba(0, 0, 0, 0.2);\n\n  /* --------------------------------------------------------\n     MOTION — calm. Pulse is the only continuous animation.\n     -------------------------------------------------------- */\n  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);\n  --ease-snap:   cubic-bezier(0.4, 0, 0.2, 1);\n  --dur-quick:   180ms;\n  --dur-base:    300ms;\n  --dur-slow:    600ms;\n  --dur-pulse:   3000ms;\n\n  /* --------------------------------------------------------\n     LAYOUT — Technical Lace\n     -------------------------------------------------------- */\n  --lace-step: 20px;   /* the grid unit, everywhere */\n  --content-max: 1024px;  /* most sections cap here */\n  --wide-max:    1280px;  /* dept grid + footer */\n}\n\n/* ============================================================\n   BASE / RESET\n   ============================================================ */\nhtml { scroll-behavior: smooth; }\n\nbody {\n  background-color: var(--bg);\n  /* Technical Lace background grid — 20px ruled paper */\n  background-image:\n    linear-gradient(var(--grid-line) 0.5px, transparent 0.5px),\n    linear-gradient(90deg, var(--grid-line) 0.5px, transparent 0.5px);\n  background-size: var(--lace-step) var(--lace-step);\n  font-family: var(--font-body);\n  font-size: var(--fs-body);\n  line-height: var(--lh-normal);\n  color: var(--fg);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* ============================================================\n   SEMANTIC TYPE STYLES\n   ============================================================ */\n.da-display, h1.da-display {\n  font-family: var(--font-headers);\n  font-weight: 700;\n  font-size: var(--fs-display);\n  line-height: var(--lh-tight);\n  letter-spacing: -0.01em;\n  color: var(--fg);\n}\n\nh1, .da-h1 {\n  font-family: var(--font-headers);\n  font-weight: 700;\n  font-size: var(--fs-h1);\n  line-height: var(--lh-tight);\n  letter-spacing: -0.005em;\n  color: var(--fg);\n}\n\nh2, .da-h2 {\n  font-family: var(--font-headers);\n  font-weight: 700;\n  font-size: var(--fs-h2);\n  line-height: var(--lh-snug);\n  color: var(--fg);\n}\n\nh3, .da-h3 {\n  font-family: var(--font-headers);\n  font-weight: 600;\n  font-size: var(--fs-h3);\n  line-height: var(--lh-snug);\n  color: var(--fg);\n}\n\nh4, .da-h4 {\n  font-family: var(--font-headers);\n  font-weight: 700;\n  font-size: var(--fs-h4);\n  line-height: var(--lh-snug);\n  color: var(--fg);\n}\n\np, .da-p {\n  font-family: var(--font-body);\n  font-size: var(--fs-body);\n  line-height: var(--lh-relaxed);\n  color: var(--fg);\n  text-wrap: pretty;\n}\n\nsmall, .da-small {\n  font-family: var(--font-body);\n  font-size: var(--fs-small);\n  line-height: var(--lh-normal);\n  color: var(--fg-muted);\n}\n\n/* Eyebrow — uppercase tracked label. Used to introduce sections. */\n.da-eyebrow {\n  font-family: var(--font-body);\n  font-size: var(--fs-micro);\n  font-weight: 700;\n  letter-spacing: var(--tracking-widest);\n  text-transform: uppercase;\n  color: var(--signal);\n  display: inline-block;\n}\n.da-eyebrow--muted { color: var(--fg-soft); }\n.da-eyebrow--blue  { color: var(--accent); }\n\n/* Code / inline code — JetBrains Mono is already the body font,\n   so .da-code just adds a tinted box. */\n.da-code, code, kbd {\n  font-family: var(--font-details);\n  font-size: 13px;\n  background-color: var(--bg-alt);\n  border: var(--border-hairline);\n  padding: 1px 6px;\n  border-radius: var(--radius-1);\n}\n\n/* Pull quote — what the brand calls a \"pinned note\" */\n.da-pull {\n  font-family: var(--font-body);\n  font-size: var(--fs-body);\n  font-style: italic;\n  line-height: var(--lh-relaxed);\n  color: var(--fg);\n  background: var(--bg-alt);\n  border: var(--border-1);\n  padding: var(--space-8) var(--space-6) var(--space-5);\n  position: relative;\n}\n\n/* Tagline — used at the top of cards or section intros */\n.da-tagline {\n  font-family: var(--font-headers);\n  font-weight: 600;\n  font-size: var(--fs-h3);\n  letter-spacing: var(--tracking-wide);\n}\n\n/* Mono caption — for spec rows, prices, hex codes */\n.da-spec {\n  font-family: var(--font-details);\n  font-size: var(--fs-small);\n  color: var(--fg-muted);\n  letter-spacing: var(--tracking-wide);\n}\n\n/* ============================================================\n   STRUCTURAL UTILITIES (used by cards, panels, slides)\n   ============================================================ */\n.da-border    { border: var(--border-1); }\n.da-hairline  { border: var(--border-hairline); }\n.da-bg        { background-color: var(--bg); }\n.da-bg-alt    { background-color: var(--bg-alt); }\n.da-bg-dark   { background-color: var(--fg); color: var(--fg-on-dark); }\n\n/* The Technical Lace canvas — apply to any surface that should\n   carry the brand's ruled-paper aesthetic. */\n.da-lace {\n  background-color: var(--bg);\n  background-image:\n    linear-gradient(var(--grid-line) 0.5px, transparent 0.5px),\n    linear-gradient(90deg, var(--grid-line) 0.5px, transparent 0.5px);\n  background-size: var(--lace-step) var(--lace-step);\n}\n\n/* ============================================================\n   THE PULSE DOT — the brand's only continuous animation.\n   Use <span class=\"da-pulse\"><\u002Fspan> or wrap with .da-pulse-stack\n   for the FAB-ring + dot combo.\n   ============================================================ */\n@keyframes da-brand-pulse {\n  0%, 100% { opacity: 1; transform: scale(1); }\n  50%      { opacity: 0.5; transform: scale(1.25); }\n}\n@keyframes da-fab-ring {\n  0%   { transform: scale(1);   opacity: 0.55; }\n  100% { transform: scale(2.4); opacity: 0; }\n}\n.da-pulse {\n  display: inline-block;\n  width: 12px; height: 12px;\n  background: var(--accent);\n  border: var(--border-1);\n  border-radius: var(--radius-pill);\n  animation: da-brand-pulse var(--dur-pulse) ease-in-out infinite;\n}\n.da-pulse-stack {\n  position: relative;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  width: 20px; height: 20px;\n}\n.da-pulse-stack::before {\n  content: \"\";\n  position: absolute;\n  inset: 2px;\n  background: var(--accent);\n  border-radius: var(--radius-pill);\n  opacity: 0.25;\n  animation: da-fab-ring 2.2s ease-out infinite;\n}\n.da-pulse-stack > .da-pulse { position: relative; z-index: 1; }\n\n/* Red signal dot — POI marker (NEVER animated). Use sparingly. */\n.da-signal-dot {\n  display: inline-block;\n  width: 14px; height: 14px;\n  background: var(--signal);\n  border: var(--border-1);\n  border-radius: var(--radius-pill);\n  box-shadow: var(--shadow-pin);\n}\n\n/* ============================================================\n   PINNED NOTE — recurring brand widget (pinned-yellow card +\n   red pin at top center). See .da-pull for the typographic side.\n   ============================================================ */\n.da-pinned {\n  position: relative;\n  background-color: var(--bg-alt);\n  border: var(--border-1);\n  border-left: 4px solid var(--signal);\n  padding: var(--space-10) var(--space-6) var(--space-5);\n}\n.da-pinned::before {\n  content: \"\";\n  position: absolute;\n  top: 12px;\n  left: 50%;\n  transform: translateX(-50%);\n  width: 14px; height: 14px;\n  background: var(--signal);\n  border-radius: var(--radius-pill);\n  border: var(--border-1);\n  box-shadow: var(--shadow-pin);\n}\n\n/* ============================================================\n   PREVIEW-CARD HELPERS — for the design system tab cards.\n   ============================================================ */\n.preview-card {\n  background: var(--bg);\n  border: var(--border-1);\n  padding: var(--space-6);\n  font-family: var(--font-body);\n  color: var(--fg);\n  width: 700px;\n  box-sizing: border-box;\n  background-image:\n    linear-gradient(var(--grid-line) 0.5px, transparent 0.5px),\n    linear-gradient(90deg, var(--grid-line) 0.5px, transparent 0.5px);\n  background-size: var(--lace-step) var(--lace-step);\n}\n<\u002Fstyle>\n<style>\n  body { margin: 0; }\n  .doc { max-width: 920px; margin: 0 auto; padding: 64px 56px 120px; }\n  .doc h1, .doc h2, .doc h3 { text-wrap: balance; }\n  .eyebrow { font-family: var(--font-body); font-size: 10px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--signal); }\n\n  /* ── Header ─────────────────────────────────────────── */\n  .doc-head { border-bottom: 2px solid var(--charcoal); padding-bottom: 26px; margin-bottom: 30px; }\n  .doc-head h1 { font-size: 42px; margin: 13px 0 16px; line-height: 1.06; }\n  .lede { font-size: 15px; line-height: 1.7; color: var(--fg); max-width: 64ch; }\n  .lede b { font-weight: 600; }\n  .meta-row { display: flex; flex-wrap: wrap; gap: 8px 22px; font-family: var(--font-details); font-size: 11px; color: var(--fg-muted); margin-top: 20px; }\n  .meta-row b { color: var(--fg); font-weight: 600; }\n\n  /* ── Controls (screen only) ─────────────────────────── */\n  .controls { position: sticky; top: 0; z-index: 20; background: var(--bg); border: 1px solid var(--charcoal); padding: 14px 18px; margin-bottom: 26px; display: flex; flex-wrap: wrap; align-items: center; gap: 14px 18px; }\n  .prog { display: flex; align-items: center; gap: 12px; flex: 1 1 260px; min-width: 220px; }\n  .prog-bar { flex: 1; height: 8px; background: var(--bg-alt); border: 1px solid var(--charcoal); position: relative; overflow: hidden; }\n  .prog-fill { position: absolute; inset: 0 100% 0 0; background: var(--accent); transition: right .4s var(--ease-out); }\n  .prog-num { font-family: var(--font-details); font-size: 12px; font-weight: 700; white-space: nowrap; }\n  .prog-num span { color: var(--fg-muted); font-weight: 400; }\n  .filters { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }\n  .filters .flabel { font-family: var(--font-details); font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--fg-soft); margin-right: 2px; }\n  .fbtn, .ctl-btn { font-family: var(--font-details); font-size: 11px; letter-spacing: .04em; background: var(--bg); color: var(--fg); border: 1px solid var(--charcoal); padding: 5px 10px; cursor: pointer; text-transform: uppercase; }\n  .fbtn:hover, .ctl-btn:hover { background: var(--accent-soft); }\n  .fbtn.active { background: var(--charcoal); color: var(--bone-white); }\n  .ctl-btn.reset:hover { background: var(--signal); color: #fff; border-color: var(--signal); }\n\n  /* ── How to use ─────────────────────────────────────── */\n  .howto { background: var(--bg-alt); border: 1px solid var(--charcoal); border-left: 4px solid var(--signal); padding: 22px 24px 18px; position: relative; margin-bottom: 40px; }\n  .howto h3 { font-size: 15px; margin: 0 0 10px; font-family: var(--font-headers); }\n  .howto ul { margin: 0; padding-left: 18px; }\n  .howto li { font-family: var(--font-details); font-size: 12px; line-height: 1.65; margin-bottom: 5px; }\n  .howto li b { color: var(--fg); }\n  .legend { display: flex; flex-wrap: wrap; gap: 7px 9px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--hairline); }\n\n  /* ── Tag chips ──────────────────────────────────────── */\n  .chip { font-family: var(--font-details); font-size: 9.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; border: 1px solid var(--charcoal); padding: 2px 7px 2px 6px; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; background: var(--bg); line-height: 1.4; }\n  .chip::before { content: \"\"; width: 7px; height: 7px; border: 1px solid var(--charcoal); background: var(--charcoal); flex: none; }\n  .chip[data-tag=\"DESIGN\"]::before { background: var(--accent); border-color: var(--accent); }\n  .chip[data-tag=\"CODE\"]::before { background: var(--bg); }\n  .chip[data-tag=\"GITHUB\"]::before { background: var(--charcoal); }\n  .chip[data-tag=\"VERCEL\"]::before { background: var(--charcoal); border-radius: 50%; }\n  .chip[data-tag=\"SUPABASE\"]::before { background: var(--bg); border-radius: 50%; }\n  .chip[data-tag=\"DNS\"]::before { background: var(--bg-alt); }\n  .chip[data-tag=\"EMAIL\"]::before { background: var(--bg); transform: rotate(45deg); }\n\n  /* ── Week sections ──────────────────────────────────── */\n  .week { margin-bottom: 48px; }\n  .week-head { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--charcoal); padding-bottom: 12px; margin-bottom: 22px; }\n  .week-head .wk { font-family: var(--font-details); font-size: 12px; font-weight: 700; color: var(--signal); letter-spacing: .06em; white-space: nowrap; }\n  .week-head h2 { font-size: 23px; margin: 0; }\n  .week-head .wgoal { font-family: var(--font-details); font-size: 11.5px; color: var(--fg-muted); margin-left: auto; text-align: right; max-width: 42%; }\n\n  /* ── Day cards ──────────────────────────────────────── */\n  .day { border: 1px solid var(--charcoal); background: var(--bg); margin-bottom: 16px; }\n  .day-head { display: flex; align-items: center; gap: 14px; padding: 13px 18px; border-bottom: 1px solid var(--hairline); background: var(--bg); }\n  .day-num { font-family: var(--font-headers); font-weight: 700; font-size: 18px; min-width: 58px; }\n  .day-num span { display: block; font-family: var(--font-details); font-size: 9px; font-weight: 500; letter-spacing: .14em; text-transform: uppercase; color: var(--signal); margin-top: 1px; }\n  .day-title { font-family: var(--font-headers); font-weight: 600; font-size: 15px; flex: 1; }\n  .day-goal { font-family: var(--font-details); font-size: 11px; color: var(--fg-muted); font-weight: 400; display: block; margin-top: 3px; }\n  .day-mins { font-family: var(--font-details); font-size: 10.5px; color: var(--fg-soft); border: 1px solid var(--hairline); padding: 3px 8px; white-space: nowrap; }\n  .day-tick { font-family: var(--font-details); font-size: 10px; color: var(--accent); white-space: nowrap; min-width: 42px; text-align: right; }\n\n  .items { list-style: none; margin: 0; padding: 6px 0; }\n  .item { display: grid; grid-template-columns: 26px 1fr auto; align-items: start; gap: 10px; padding: 9px 18px; border-bottom: 1px solid transparent; }\n  .item + .item { border-top: 1px solid var(--hairline); }\n  .item.hide { display: none; }\n  .item label { cursor: pointer; display: contents; }\n  .cbox { appearance: none; -webkit-appearance: none; width: 17px; height: 17px; border: 1px solid var(--charcoal); background: var(--bg); cursor: pointer; margin: 1px 0 0; position: relative; flex: none; }\n  .cbox:checked { background: var(--accent); border-color: var(--accent); }\n  .cbox:checked::after { content: \"\"; position: absolute; left: 5px; top: 1.5px; width: 4px; height: 9px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); }\n  .cbox.crit:checked { background: var(--signal); border-color: var(--signal); }\n  .item-body { min-width: 0; }\n  .item-t { font-family: var(--font-details); font-size: 12.5px; line-height: 1.55; color: var(--fg); }\n  .item.checked .item-t { color: var(--fg-soft); text-decoration: line-through; text-decoration-color: var(--hairline); }\n  .item-done { font-family: var(--font-details); font-size: 11px; line-height: 1.5; color: var(--fg-muted); margin-top: 3px; }\n  .item-done b { color: var(--signal); font-weight: 600; letter-spacing: .03em; }\n  .item-tags { display: flex; flex-wrap: wrap; gap: 5px; justify-content: flex-end; }\n  .crit-flag { color: var(--signal); font-weight: 700; }\n\n  /* ── Hand-to-Claude prompt block ────────────────────── */\n  .prompt { border-top: 1px solid var(--hairline); }\n  .prompt-head { display: flex; align-items: center; gap: 10px; padding: 9px 18px; }\n  .prompt-head .pl { font-family: var(--font-details); font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); display: flex; align-items: center; gap: 7px; }\n  .prompt-head .pl::before { content: \"\"; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); border: 1px solid var(--accent); }\n  .copy-btn { margin-left: auto; font-family: var(--font-details); font-size: 10.5px; letter-spacing: .04em; background: var(--bg); color: var(--fg); border: 1px solid var(--charcoal); padding: 4px 10px; cursor: pointer; white-space: nowrap; }\n  .copy-btn:hover { background: var(--accent-soft); }\n  .copy-btn.copied { background: var(--charcoal); color: var(--bone-white); border-color: var(--charcoal); }\n  .prompt-body { font-family: var(--font-details); font-size: 11.5px; line-height: 1.7; background: var(--charcoal); color: var(--bone-white); padding: 14px 18px 16px; margin: 0; white-space: pre-wrap; word-break: break-word; }\n  .prompt-body code { background: rgba(255,255,255,.1); border: 0; color: #e7a07f; padding: 0 3px; }\n\n  /* ── Weekend cards ──────────────────────────────────── */\n  .weekend { border: 1px dashed var(--grid-line-strong); background: var(--bg-alt); margin-bottom: 16px; padding: 16px 20px 14px; }\n  .weekend-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 10px; }\n  .weekend-head .we-tag { font-family: var(--font-details); font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--fg-soft); }\n  .weekend-head h3 { font-family: var(--font-headers); font-size: 14px; margin: 0; font-weight: 600; }\n  .weekend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 28px; }\n  .weekend-col h4 { font-family: var(--font-details); font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--signal); margin: 0 0 6px; }\n  .weekend .items { padding: 0; }\n  .weekend .item { grid-template-columns: 26px 1fr; padding: 6px 0; }\n  .weekend .item + .item { border-top: 1px solid var(--hairline); }\n\n  /* ── Finish line ────────────────────────────────────── */\n  .finish { border: 1px solid var(--charcoal); border-top: 4px solid var(--signal); background: var(--bg); padding: 26px 28px; margin-top: 8px; }\n  .finish h2 { font-size: 22px; margin: 0 0 8px; }\n  .finish p { font-size: 13px; line-height: 1.7; margin: 0; max-width: 64ch; }\n  .finish .da-pulse { vertical-align: middle; margin-right: 8px; }\n\n  .footer { margin-top: 60px; padding-top: 20px; border-top: 1px solid var(--hairline); font-family: var(--font-details); font-size: 11px; color: var(--fg-soft); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }\n\n  /* ── Print ──────────────────────────────────────────── */\n  @media print {\n    body { background: #fff; }\n    .controls { display: none; }\n    .doc { padding: 24px 28px; max-width: none; }\n    .week, .day, .weekend, .finish, .howto { break-inside: avoid; }\n    .day-tick { display: none; }\n    .cbox { -webkit-print-color-adjust: exact; print-color-adjust: exact; }\n    .item.hide { display: grid; }\n    .copy-btn { display: none; }\n    .prompt-body { background: var(--bg-alt); color: var(--fg); border: 1px solid var(--hairline); -webkit-print-color-adjust: exact; print-color-adjust: exact; }\n    .prompt-body code { background: transparent; color: var(--signal); }\n  }\n  @page { margin: 14mm; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"doc\">\n\n  <header class=\"doc-head\">\n    <span class=\"eyebrow\">Build Log · Phase 1 · The Connected Loop<\u002Fspan>\n    <h1>The 30-Day Run<\u002Fh1>\n    <p class=\"lede\">One job: get the <b>connected loop<\u002Fb> live — you edit in the Press Office, and <b>digitalallies.net<\u002Fb> changes. Twenty working days, two lighter review days a week. One focus per day, sized to the ~135 minutes you've got. Tick as you go; it saves itself. Print it if you'd rather check off on paper.<\u002Fp>\n    <div class=\"meta-row\">\n      <span><b>Owner<\u002Fb> Anthony · Kingman, AZ<\u002Fspan>\n      <span><b>Scope<\u002Fb> Phase 1 only<\u002Fspan>\n      <span><b>Cadence<\u002Fb> 5 build · 2 review<\u002Fspan>\n      <span><b>Daily<\u002Fb> ~135 min<\u002Fspan>\n      <span><b>Driven by<\u002Fb> Claude Design · Claude Code<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- Controls -->\n  <div class=\"controls\">\n    <div class=\"prog\">\n      <span class=\"prog-num\"><span id=\"progDone\">0<\u002Fspan> / <span id=\"progTotal\">0<\u002Fspan> <span>done<\u002Fspan><\u002Fspan>\n      <div class=\"prog-bar\"><div class=\"prog-fill\" id=\"progFill\"><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"filters\" id=\"filters\">\n      <span class=\"flabel\">View<\u002Fspan>\n      <button class=\"fbtn active\" data-filter=\"ALL\">All<\u002Fbutton>\n      <button class=\"fbtn\" data-filter=\"DESIGN\">Design app<\u002Fbutton>\n      <button class=\"fbtn\" data-filter=\"CODE\">Code<\u002Fbutton>\n      <button class=\"fbtn\" data-filter=\"GITHUB\">GitHub<\u002Fbutton>\n      <button class=\"fbtn\" data-filter=\"VERCEL\">Vercel<\u002Fbutton>\n      <button class=\"fbtn\" data-filter=\"SUPABASE\">Supabase<\u002Fbutton>\n      <button class=\"fbtn\" data-filter=\"DNS\">DNS<\u002Fbutton>\n      <button class=\"fbtn\" data-filter=\"EMAIL\">Email<\u002Fbutton>\n    <\u002Fdiv>\n    <button class=\"ctl-btn\" onclick=\"window.print()\">Print<\u002Fbutton>\n    <button class=\"ctl-btn reset\" id=\"resetBtn\">Reset<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- How to use -->\n  <div class=\"howto\">\n    <h3>How to run this without burning out<\u002Fh3>\n    <ul>\n      <li><b>One card a day.<\u002Fb> Each day is a single focus. Do it, tick it, close the laptop.<\u002Fli>\n      <li><b>Stop at 135.<\u002Fb> If the timer's up mid-task, leave a note in your commit and pick it up tomorrow. The plan has slack.<\u002Fli>\n      <li><b>Every build day ends two ways:<\u002Fb> a commit pushed to GitHub, and a green deploy on Vercel. If both are true, the day shipped.<\u002Fli>\n      <li><b>\"Done when —\"<\u002Fb> lines are your acceptance check. Don't tick the day complete until its Done-when is true.<\u002Fli>\n      <li><b>Weekends are review, not building.<\u002Fb> Skim, confirm, breathe. The work waits.<\u002Fli>\n      <li><b>You're driving Claude.<\u002Fb> Items tagged <span class=\"chip\" data-tag=\"CODE\">Code<\u002Fspan> mean \"have Claude Code write it\" — your job is to point, paste, and check the result, not to type the code.<\u002Fli>\n    <\u002Ful>\n    <div class=\"legend\">\n      <span class=\"chip\" data-tag=\"DESIGN\">Design app<\u002Fspan>\n      <span class=\"chip\" data-tag=\"CODE\">Claude Code<\u002Fspan>\n      <span class=\"chip\" data-tag=\"GITHUB\">GitHub<\u002Fspan>\n      <span class=\"chip\" data-tag=\"VERCEL\">Vercel<\u002Fspan>\n      <span class=\"chip\" data-tag=\"SUPABASE\">Supabase<\u002Fspan>\n      <span class=\"chip\" data-tag=\"DNS\">Domain / DNS<\u002Fspan>\n      <span class=\"chip\" data-tag=\"EMAIL\">Email<\u002Fspan>\n      <span style=\"font-family:var(--font-details);font-size:10px;color:var(--fg-soft);align-self:center;\"><span class=\"crit-flag\">●<\u002Fspan> = irreversible / cutover — read twice, do once.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <main id=\"plan\"><\u002Fmain>\n\n  <div class=\"finish\">\n    <h2><span class=\"da-pulse\"><\u002Fspan>The finish line<\u002Fh2>\n    <p>When the last box is ticked, the loop is closed: a page edited in the Press Office redraws the live site, the contact form drops a transmission in your inbox, and login works on the real domain. That's Phase 1 — a connected CMS running digitalallies.net for real. Everything after it (multi-client, plans, billing, The Workshop) is additive and sellable. No surprises, no silent scope creep. Go take a real lunch break.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"footer\">\n    <span>Digital Allies · Connected CMS · The 30-Day Run · Phase 1<\u002Fspan>\n    <span>Kingman, AZ · Serving Everywhere Else<\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<script>\n/* ============================================================\n   The plan. Data-driven so it stays legible and editable.\n   tag: DESIGN | CODE | GITHUB | VERCEL | SUPABASE | DNS | EMAIL\n   crit: true  -> irreversible / cutover (red tick + flag)\n   done: the \"Done when —\" acceptance check\n   ============================================================ */\nconst PLAN = [\n  {\n    n: 1, title: \"Lay the rails\",\n    goal: \"Repo, deploy pipeline, and a database — connected and shipping a skeleton.\",\n    days: [\n      { d: 1, day: \"Mon\", title: \"Repo + Next.js skeleton\", mins: 120,\n        goal: \"A real codebase, version-controlled.\",\n        items: [\n          { t: \"Create the private <code>digital-allies-cms<\u002Fcode> repo on GitHub.\", tag: \"GITHUB\" },\n          { t: \"In Claude Code, scaffold a Next.js app (App Router, TypeScript, Tailwind) in your local project folder.\", tag: \"CODE\", done: \"<code>npm run dev<\u002Fcode> serves the starter on localhost.\" },\n          { t: \"First commit, push to <code>main<\u002Fcode>. Add a <code>develop<\u002Fcode> branch for day-to-day work.\", tag: \"GITHUB\", done: \"GitHub shows the Next.js starter on a green first commit.\" },\n        ] },\n      { d: 2, day: \"Tue\", title: \"Vercel auto-deploy + previews\", mins: 90,\n        goal: \"Every push deploys itself.\",\n        items: [\n          { t: \"Import the GitHub repo into Vercel (New Project → from Git).\", tag: \"VERCEL\" },\n          { t: \"Confirm <code>main<\u002Fcode> deploys to a <code>*.vercel.app<\u002Fcode> URL that loads.\", tag: \"VERCEL\", done: \"The live URL shows your starter.\" },\n          { t: \"Open a PR from a branch → confirm Vercel posts a Preview deploy link on it.\", tag: \"VERCEL\", done: \"Pushing main redeploys prod; a PR gives a preview URL.\" },\n        ] },\n      { d: 3, day: \"Wed\", title: \"Supabase project + wiring\", mins: 135,\n        goal: \"Database created and reachable from the deploy.\",\n        items: [\n          { t: \"Create a new Supabase project (region us-west, closest to AZ). Save the DB password somewhere safe.\", tag: \"SUPABASE\" },\n          { t: \"Copy Project URL + anon key + service-role key.\", tag: \"SUPABASE\" },\n          { t: \"Add them as env vars in Vercel for Production, Preview, and Development.\", tag: \"VERCEL\", done: \"<code>NEXT_PUBLIC_SUPABASE_URL<\u002Fcode>, anon key, and service key all present.\" },\n          { t: \"Have Claude install the Supabase client (<code>@supabase/supabase-js<\u002Fcode> + <code>@supabase/ssr<\u002Fcode>) and add the client helpers.\", tag: \"CODE\" },\n          { t: \"Run <code>vercel env pull .env.local<\u002Fcode> so local dev matches production.\", tag: \"CODE\", done: \"A deployed test page reads a value from Supabase with no errors.\" },\n        ] },\n      { d: 4, day: \"Thu\", title: \"The map + brand tokens in-repo\", mins: 110,\n        goal: \"Claude can re-read the plan and build to the brand each day.\",\n        items: [\n          { t: \"In the design app, confirm the visual you're building to — the prototype + design system are your pixel target. Note anything still unsettled.\", tag: \"DESIGN\" },\n          { t: \"Drop the brand tokens into the app: <code>colors_and_type.css<\u002Fcode>, the fonts, and global styles.\", tag: \"CODE\", done: \"A page styled with brand vars renders in Lexend Deca + JetBrains Mono.\" },\n          { t: \"Copy <code>store.js<\u002Fcode> + the Build Plan into a <code>/reference<\u002Fcode> folder (not shipped) for Claude to read.\", tag: \"CODE\" },\n          { t: \"Have Claude write a short <code>ARCHITECTURE.md<\u002Fcode> from the Build Plan's Vercel layout.\", tag: \"CODE\", done: \"Repo has brand tokens loaded and an architecture note.\" },\n        ] },\n      { d: 5, day: \"Fri\", title: \"Magic-link auth\", mins: 135,\n        goal: \"You can log in; strangers can't.\",\n        items: [\n          { t: \"In Supabase Auth, enable the Email provider and turn on magic links.\", tag: \"SUPABASE\" },\n          { t: \"Set Site URL + redirect URLs (localhost + the vercel.app URL).\", tag: \"SUPABASE\", crit: true },\n          { t: \"Have Claude build a <code>/login<\u002Fcode> page, the sign-in flow with <code>@supabase/ssr<\u002Fcode>, and middleware that protects the admin routes.\", tag: \"CODE\" },\n          { t: \"Add yourself as the first user and request a link.\", tag: \"SUPABASE\", done: \"You click the email link, land on a protected <code>/dashboard<\u002Fcode> stub; logged-out users bounce to <code>/login<\u002Fcode>.\" },\n        ] },\n    ],\n    weekend: {\n      label: \"Review — Week 1\",\n      sat: [\n        { t: \"Skim the week's commits. Confirm prod + a preview both deploy green.\", tag: \"GITHUB\" },\n        { t: \"Jot anything that felt shaky into a notes file.\", tag: \"CODE\" },\n      ],\n      sun: [\n        { t: \"Read next week's five days so Monday starts warm.\", tag: \"DESIGN\" },\n        { t: \"No building. The rails are down — that's the hard part.\", tag: \"DESIGN\" },\n      ],\n    },\n  },\n  {\n    n: 2, title: \"The store\",\n    goal: \"Translate the prototype's data shape into a real, secured Supabase database — seeded with the real site.\",\n    days: [\n      { d: 6, day: \"Mon\", title: \"Schema: clients + settings\", mins: 120,\n        goal: \"The tenant record the whole model hangs off.\",\n        items: [\n          { t: \"Have Claude turn the <code>store.js<\u002Fcode> shape into SQL: a <code>clients<\u002Fcode> table (name, domain, initials, brand_color, plan, owner flag) and a settings store.\", tag: \"CODE\" },\n          { t: \"Run the migration in the Supabase SQL editor.\", tag: \"SUPABASE\" },\n          { t: \"Seed the Digital Allies client row (owner, agency) + its settings from the prototype's <code>DA_SETTINGS<\u002Fcode>.\", tag: \"SUPABASE\", done: \"The clients + settings rows are visible in the Table editor.\" },\n        ] },\n      { d: 7, day: \"Tue\", title: \"Schema: content collections\", mins: 120,\n        goal: \"Somewhere for every kind of content to live.\",\n        items: [\n          { t: \"Tables, each with a <code>client_id<\u002Fcode> FK: <code>pages<\u002Fcode> (blocks as JSONB), <code>articles<\u002Fcode>, <code>departments<\u002Fcode>, <code>field_notes<\u002Fcode>, <code>messages<\u002Fcode>.\", tag: \"CODE\" },\n          { t: \"Run the migration; add indexes on client_id + slug + status.\", tag: \"SUPABASE\", done: \"All five tables exist with the right columns + FKs.\" },\n        ] },\n      { d: 8, day: \"Wed\", title: \"Seed the real site\", mins: 110,\n        goal: \"The actual Digital Allies content, in the database.\",\n        items: [\n          { t: \"Have Claude write a seed script that loads the prototype's pages, articles, departments, and field notes into Supabase.\", tag: \"CODE\" },\n          { t: \"Run it; spot-check Home / About / Services and their blocks.\", tag: \"SUPABASE\", done: \"Querying pages for DA returns the Home page with its hero / departments / fieldNotes / cta blocks intact.\" },\n        ] },\n      { d: 9, day: \"Thu\", title: \"RLS — the security boundary\", mins: 135,\n        goal: \"Drafts stay private; published is public; tenants never cross.\",\n        items: [\n          { t: \"Add a <code>memberships<\u002Fcode> table (user ↔ client) to drive access.\", tag: \"CODE\" },\n          { t: \"Turn on Row Level Security for every content table.\", tag: \"SUPABASE\", crit: true },\n          { t: \"Policies: your user reads/writes its client's rows; anon reads only <code>published<\u002Fcode> rows.\", tag: \"SUPABASE\", crit: true, done: \"The anon key can read published pages but cannot see drafts or write anything.\" },\n        ] },\n      { d: 10, day: \"Fri\", title: \"lib/store.ts — the swap\", mins: 135,\n        goal: \"The prototype's data functions, now backed by Postgres.\",\n        items: [\n          { t: \"Have Claude build <code>lib/store.ts<\u002Fcode> with the same reads/writes the prototype exposed (getPages, savePage, getArticles…), backed by Supabase.\", tag: \"CODE\" },\n          { t: \"Add <code>lib/plans.ts<\u002Fcode> with the tiers + the <code>can(client, module)<\u002Fcode> helper — keep the seam even though Phase 1 is one client.\", tag: \"CODE\" },\n          { t: \"Render the DA page titles from the database in a server component.\", tag: \"CODE\", done: \"A page calls getPages() and lists the real page titles from Supabase.\" },\n        ] },\n    ],\n    weekend: {\n      label: \"Review — Week 2\",\n      sat: [\n        { t: \"Open Supabase, eyeball the seeded data; confirm RLS didn't break the published reads.\", tag: \"SUPABASE\" },\n        { t: \"Confirm the deploy is still green.\", tag: \"VERCEL\" },\n      ],\n      sun: [\n        { t: \"Take a manual database backup from Supabase.\", tag: \"SUPABASE\" },\n        { t: \"Light read-ahead. The data layer is done — the rest is UI.\", tag: \"DESIGN\" },\n      ],\n    },\n  },\n  {\n    n: 3, title: \"The Press Office\",\n    goal: \"Port the admin workspace so it reads and writes the live database — the half you'll actually use every day.\",\n    days: [\n      { d: 11, day: \"Mon\", title: \"Admin shell + dashboard\", mins: 120,\n        goal: \"The workspace frame, with real numbers.\",\n        items: [\n          { t: \"In the design app, confirm the admin shell layout (nav, top bar, client identity) you're matching.\", tag: \"DESIGN\" },\n          { t: \"Have Claude port the shell into the <code>(admin)<\u002Fcode> layout and wire the dashboard counts (pages, drafts, unread messages) to <code>store.ts<\u002Fcode>.\", tag: \"CODE\", done: \"Logged-in <code>/dashboard<\u002Fcode> shows real counts from Supabase in the brand shell.\" },\n        ] },\n      { d: 12, day: \"Tue\", title: \"Pages list + builder (read)\", mins: 120,\n        goal: \"See the real pages and their blocks.\",\n        items: [\n          { t: \"In the design app, lock the page-builder block visuals (hero, richtext, departments, fieldNotes, cta) as the build reference.\", tag: \"DESIGN\" },\n          { t: \"Have Claude build the Pages list (title, slug, status, updated) and a read-only block renderer.\", tag: \"CODE\", done: \"Opening the Home page shows its blocks in order.\" },\n        ] },\n      { d: 13, day: \"Wed\", title: \"Page builder (write)\", mins: 135,\n        goal: \"Edits that stick.\",\n        items: [\n          { t: \"Wire it up: reorder blocks, edit block data, add/remove blocks, save → writes JSONB back to Supabase.\", tag: \"CODE\" },\n          { t: \"Add the draft / published status toggle.\", tag: \"CODE\", done: \"Editing the hero heading and saving changes the row and survives a reload.\" },\n        ] },\n      { d: 14, day: \"Thu\", title: \"Articles + Settings\", mins: 135,\n        goal: \"The Journal and the site's own knobs.\",\n        items: [\n          { t: \"Articles (The Journal) list + editor (title, slug, excerpt, content, status).\", tag: \"CODE\" },\n          { t: \"Site Settings form writing the settings record (hero, about, phone, email, hours).\", tag: \"CODE\", done: \"You can publish an article and edit settings, both persisting.\" },\n        ] },\n      { d: 15, day: \"Fri\", title: \"Command Center + polish\", mins: 120,\n        goal: \"The inbox, and a workspace that feels finished.\",\n        items: [\n          { t: \"Read-only inbox of transmissions (messages) with read / unread state.\", tag: \"CODE\" },\n          { t: \"Tidy nav, empty states, and stub the lock icon for Studio+ modules (the gating seam).\", tag: \"CODE\" },\n          { t: \"Walk the full edit → save → reload loop end to end.\", tag: \"DESIGN\", done: \"The admin matches the prototype and is backed entirely by the database.\" },\n        ] },\n    ],\n    weekend: {\n      label: \"Review — Week 3\",\n      sat: [\n        { t: \"Click through the whole admin as your own user; note rough edges.\", tag: \"DESIGN\" },\n        { t: \"Confirm the deploy is green.\", tag: \"VERCEL\" },\n      ],\n      sun: [\n        { t: \"Write next week's launch-day list in your own words.\", tag: \"DESIGN\" },\n        { t: \"Confirm you have registrar access to digitalallies.net's DNS — you'll need it.\", tag: \"DNS\" },\n      ],\n    },\n  },\n  {\n    n: 4, title: \"Go live\",\n    goal: \"Render the public site from the same store, wire the domain and email, and close the loop on the real digitalallies.net.\",\n    days: [\n      { d: 16, day: \"Mon\", title: \"Public renderer\", mins: 135,\n        goal: \"The site, drawn from the database.\",\n        items: [\n          { t: \"In the design app, finalize the public page designs (hero, departments, field notes) as the renderer's reference.\", tag: \"DESIGN\" },\n          { t: \"Have Claude build the <code>(site)/[client]<\u002Fcode> route + a block registry (hero, richtext, departments, fieldNotes, cta), each reading published data.\", tag: \"CODE\", done: \"A public URL renders the real Home page from Supabase, no auth.\" },\n        ] },\n      { d: 17, day: \"Tue\", title: \"Full site parity\", mins: 135,\n        goal: \"It looks like digitalallies.net — because it is.\",\n        items: [\n          { t: \"Render About, Services (when published), and article pages; departments + field notes pull their live collections.\", tag: \"CODE\" },\n          { t: \"Match the brand using the design system components, not hand-rolled CSS.\", tag: \"DESIGN\", done: \"The public site matches the brand and reads entirely from the store.\" },\n        ] },\n      { d: 18, day: \"Wed\", title: \"The transmission loop\", mins: 120,\n        goal: \"The contact form actually reaches you.\",\n        items: [\n          { t: \"Pick the email path (Resend or Supabase SMTP); add the API key to Vercel env.\", tag: \"EMAIL\" },\n          { t: \"Have Claude wire the contact form (Send a Transmission) to write a <code>messages<\u002Fcode> row and fire an email to contact@digitalallies.net.\", tag: \"CODE\", done: \"Submitting the form creates a row, emails you, and shows in the admin inbox.\" },\n        ] },\n      { d: 19, day: \"Thu\", title: \"Domain + DNS cutover\", mins: 110,\n        goal: \"The real address, pointed at the new site. Do this early in the day.\",\n        items: [\n          { t: \"Add digitalallies.net (+ www) as a domain in Vercel.\", tag: \"VERCEL\", crit: true },\n          { t: \"Update the A / CNAME records at the registrar per Vercel's instructions. Keep the old site reachable until verified.\", tag: \"DNS\", crit: true },\n          { t: \"Update Supabase Auth Site URL + redirect URLs to the real domain.\", tag: \"SUPABASE\", crit: true, done: \"https://digitalallies.net serves the new site over HTTPS and magic-link login still works.\" },\n        ] },\n      { d: 20, day: \"Fri\", title: \"Launch QA + cut over\", mins: 135,\n        goal: \"Close the loop. Ship it.\",\n        items: [\n          { t: \"Full pass: every page loads, forms work, login works, drafts stay hidden, mobile looks right, Lighthouse is sane.\", tag: \"DESIGN\" },\n          { t: \"Production deploy from <code>main<\u002Fcode>; tag a <code>v1<\u002Fcode> release in GitHub.\", tag: \"GITHUB\", crit: true },\n          { t: \"Edit a page in the Press Office and watch digitalallies.net change.\", tag: \"DESIGN\", done: \"The connected loop is live. Phase 1 shipped.\", crit: true },\n        ] },\n    ],\n    weekend: {\n      label: \"Land it — Week 4\",\n      sat: [\n        { t: \"Watch it: Vercel logs + Supabase logs for errors. Take a fresh DB backup.\", tag: \"VERCEL\" },\n        { t: \"Write down what's left for Phase 2 (multi-client, plans, billing).\", tag: \"DESIGN\" },\n      ],\n      sun: [\n        { t: \"Off. You shipped a connected CMS running your real site.\", tag: \"DESIGN\" },\n        { t: \"It is a very avant-garde concept called 'Doing My Job.'\", tag: \"DESIGN\" },\n      ],\n    },\n  },\n];\n\n/* ── Render ──────────────────────────────────────────── */\nconst LS_KEY = \"da_cms_run_v1\";\nconst state = JSON.parse(localStorage.getItem(LS_KEY) || \"{}\");\n\nconst tagLabel = { DESIGN: \"Design app\", CODE: \"Claude Code\", GITHUB: \"GitHub\", VERCEL: \"Vercel\", SUPABASE: \"Supabase\", DNS: \"Domain / DNS\", EMAIL: \"Email\" };\n\n/* Ready-to-paste prompts, one per build day. Hand to Claude Code\n   (or Claude Design where noted) to get the day's work done. */\nconst PROMPTS = {\n  1: \"You're helping me build the Digital Allies Connected CMS \\u2014 Next.js (App Router, TypeScript, Tailwind) on Vercel, Supabase for data + auth. Scaffold a fresh Next.js app in this folder. Set up a clean folder structure I can grow into (an (admin) group for the auth-gated workspace, a (site) group for the public renderer, lib/ for data + plans). Get it running locally, then give me the exact git commands to make the first commit on `main` and create a `develop` branch. Keep explanations short \\u2014 I'm driving you, not writing the code myself.\",\n  2: \"My Next.js repo is on GitHub and imported into Vercel. Walk me through confirming auto-deploy works: how to verify `main` is the production branch, how to trigger and find a Preview deploy from a pull request, and where build settings live. Give me a tiny throwaay change to push on a branch so I can see a preview URL appear. List the exact clicks in the Vercel dashboard \\u2014 assume I'm looking at it right now.\",\n  3: \"Help me connect Supabase to my Next.js app on Vercel. I've created a Supabase project. Tell me exactly which keys to copy (URL, anon, service-role) and which to mark public vs server-only. Install `@supabase/supabase-js` and `@supabase/ssr` and create the browser + server client helpers in lib/. Then give me the Vercel CLI commands to set the env vars for all three environments and to pull them locally with `vercel env pull`. Finish by writing me a one-line test that proves the deployed app can reach Supabase.\",\n  4: \"Read the files in /reference (store.js and the Build Plan) so you understand the data model and target architecture. Then: (1) wire the Digital Allies brand tokens into the app \\u2014 add colors_and_type.css and the Lexend Deca + JetBrains Mono fonts to global styles so pages render in the brand; (2) write a short ARCHITECTURE.md from the Build Plan's Vercel layout that you and I can both re-read each day. Show me a single styled test page proving the fonts and charcoal/bone colors are live.\",\n  5: \"Set up magic-link auth for the Digital Allies CMS using Supabase + @supabase/ssr. Build a /login page (brand-styled, square corners, JetBrains Mono), the sign-in action that sends a magic link, the callback handler, and middleware that protects every route in the (admin) group and redirects logged-out users to /login. Tell me exactly what to set for Site URL and redirect URLs in the Supabase Auth dashboard (localhost + my vercel.app URL) and how to add myself as the first user.\",\n  6: \"Using store.js in /reference as the source of truth for shape, write the SQL to create a `clients` table (id, name, domain, initials, brand_color, plan enum starter|studio|agency, owner boolean, live_url, admin_url) and a place to store per-client site settings (hero, about, phone, email, hours \\u2014 JSONB is fine). Give me the migration to paste into the Supabase SQL editor, then a seed insert for the Digital Allies client (owner=true, plan=agency) using the DA_SETTINGS values from store.js.\",\n  7: \"Continue the Supabase schema for the Digital Allies CMS. Create the content tables, each with a `client_id` foreign key to clients: `pages` (with a `blocks` JSONB column), `articles`, `departments`, `field_notes`, `messages`. Add the columns the prototype uses (slug, status, excerpt, etc.) and indexes on (client_id, slug) and (client_id, status). Give me one migration to paste into the SQL editor and a quick checklist to confirm the tables and FKs in the Table editor.\",\n  8: \"Write a seed script that loads the real Digital Allies content from /reference/store.js (DA_PAGES, plus its articles, departments, and field notes) into my Supabase tables for the Digital Allies client. Preserve the page blocks exactly as JSONB. Make it idempotent so I can re-run it safely. Tell me how to run it and give me one SQL query I can paste to confirm the Home page came back with its hero / departments / fieldNotes / cta blocks intact.\",\n  9: \"Lock down the Digital Allies CMS database with Row Level Security. First add a `memberships` table linking auth users to clients. Then enable RLS on clients and all content tables and write policies so: (a) a member can read and write rows for their client; (b) the anon role can read ONLY rows where status = 'published'; (c) nobody can read another client's data. Give me the SQL to paste, then exact steps to verify with the anon key that drafts are invisible and writes are rejected. This is irreversible-ish \\u2014 explain anything risky before I run it.\",\n  10: \"Build lib/store.ts \\u2014 the data-access layer for the Digital Allies CMS \\u2014 exposing the same functions the prototype's store.js had (getSite, getPages, getPage, savePage, getArticles, saveArticle, getDepartments, getFieldNotes, getMessages, getSettings, saveSettings), but backed by Supabase queries scoped to a client_id. Also write lib/plans.ts with the three tiers and a `can(client, module)` helper. Then show me a server component that calls getPages() and renders the real Digital Allies page titles from the database.\",\n  11: \"Port the admin workspace shell from the prototype into the (admin) layout: the side nav, top bar, and client identity, all brand-styled (charcoal/bone, square corners, Lexend Deca headers). Build the Dashboard as the landing screen with live counts \\u2014 total pages, drafts, unread transmissions \\u2014 read through lib/store.ts. Match the look of the prototype in /reference. Show me /dashboard rendering real numbers from Supabase.\",\n  12: \"Build the Press Office Pages module for the Digital Allies CMS. A list view of pages (title, slug, status badge, last updated) and, on opening a page, a block renderer that shows its blocks (hero, richtext, departments, fieldNotes, cta) read-only for now, reading through lib/store.ts. Keep it brand-styled. Show me the seeded Home page rendering its blocks in the correct order.\",\n  13: \"Make the Digital Allies page builder editable. Wire up: reordering blocks (drag or up/down), editing each block's data inline, adding and removing blocks, and a Save that writes the blocks array back to the page's JSONB column via lib/store.ts. Add a draft/published status toggle. Optimistic UI is fine. Show me that editing the hero heading and saving changes the row in Supabase and survives a page reload.\",\n  14: \"Build two more Press Office areas for the Digital Allies CMS. (1) Articles (The Journal): a list plus an editor with title, slug, excerpt, content, and a draft/published toggle, all through lib/store.ts. (2) Site Settings: a form bound to the client's settings record (hero title/subtitle, about, phone, email, hours) that saves back to Supabase. Brand-styled. Show me publishing an article and editing a setting, both persisting after reload.\",\n  15: \"Finish the Press Office. Build the Command Center: a read-only inbox listing transmissions (the `messages` table) with read/unread state and a detail view. Then polish the workspace \\u2014 tidy the nav, add empty states in the brand voice, and stub a lock icon next to Studio+ modules (Projects, Research, Workshop) using the can() helper, even though they're hidden in Phase 1. Walk the whole edit \\u2192 save \\u2192 reload loop with me and flag anything rough.\",\n  16: \"Build the public site renderer for the Digital Allies CMS at (site)/[client]. Create a block registry that maps each block type (hero, richtext, departments, fieldNotes, cta) to a brand-styled React component, reading ONLY published data through lib/store.ts (no auth). The departments and fieldNotes blocks should pull their live collections. Render the real Digital Allies Home page from Supabase at a public URL and show it to me.\",\n  17: \"Extend the public renderer to full parity with digitalallies.net. Render the About page, the Services page when published, and individual article pages. Make sure departments and field notes pull live from their tables. Use the Digital Allies design system components and tokens so it matches the brand exactly \\u2014 don't hand-roll CSS where a brand component exists. Show me the public site reading entirely from the store and looking like the real site.\",\n  18: \"Wire the contact form (Send a Transmission) on the public Digital Allies site to do two things on submit: insert a row into the `messages` table, and send a transactional email to contact@digitalallies.net. Recommend Resend vs Supabase SMTP for a one-person setup and set up whichever is simpler. Put the API key in Vercel env. Use a server action. Show me that a submission creates a message row, emails me, and appears in the admin Command Center inbox.\",\n  19: \"Help me point digitalallies.net at this Vercel deployment safely \\u2014 this is a live cutover, so go slow and tell me what's reversible. Walk me through: adding digitalallies.net and www to the Vercel project, the exact A/CNAME records to set at my registrar, how to verify propagation, and updating Supabase Auth Site URL + redirect URLs to the real domain. Keep the old site reachable until the new one is verified over HTTPS and magic-link login works on the real domain.\",\n  20: \"Run final launch QA on the Digital Allies CMS with me. Give me a tight checklist to verify: every public page loads, the contact form works end-to-end, login works on digitalallies.net, drafts stay hidden from anon, mobile layout holds, and Lighthouse is reasonable. Then give me the commands to do a clean production deploy from `main` and tag a `v1` release on GitHub. Finally, confirm the connected loop: I edit a page in the Press Office and digitalallies.net changes.\",\n};\n\nfunction chip(tag) {\n  return `<span class=\"chip\" data-tag=\"${tag}\">${tagLabel[tag] || tag}<\u002Fspan>`;\n}\n\nfunction itemRow(id, it) {\n  const checked = state[id] ? \"checked\" : \"\";\n  const cls = state[id] ? \"item checked\" : \"item\";\n  const critTick = it.crit ? \"crit\" : \"\";\n  const flag = it.crit ? '<span class=\"crit-flag\" title=\"Irreversible / cutover\">● <\u002Fspan>' : \"\";\n  const done = it.done ? `<div class=\"item-done\"><b>Done when —<\u002Fb> ${it.done}<\u002Fdiv>` : \"\";\n  return `<li class=\"item\" data-id=\"${id}\" data-tag=\"${it.tag}\">\n    <label>\n      <input type=\"checkbox\" class=\"cbox ${critTick}\" data-id=\"${id}\" ${checked}>\n      <span class=\"item-body\"><span class=\"item-t\">${flag}${it.t}<\u002Fspan>${done}<\u002Fspan>\n      <span class=\"item-tags\">${chip(it.tag)}<\u002Fspan>\n    <\u002Flabel>\n  <\u002Fli>`;\n}\n\nfunction dayCard(day) {\n  const ids = day.items.map((_, i) => `d${day.d}-i${i}`);\n  const rows = day.items.map((it, i) => itemRow(ids[i], it)).join(\"\");\n  const goal = day.goal ? `<span class=\"day-goal\">${day.goal}<\u002Fspan>` : \"\";\n  const p = PROMPTS[day.d];\n  const prompt = p ? `<div class=\"prompt\">\n      <div class=\"prompt-head\">\n        <span class=\"pl\">Hand to Claude<\u002Fspan>\n        <button class=\"copy-btn\" type=\"button\" data-copy=\"p${day.d}\">[ Copy prompt ]<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"prompt-body\" id=\"p${day.d}\">${p}<\u002Fdiv>\n    <\u002Fdiv>` : \"\";\n  return `<div class=\"day\" data-daygroup=\"${ids.join(\" \")}\">\n    <div class=\"day-head\">\n      <div class=\"day-num\">${String(day.d).padStart(2, \"0\")}<span>${day.day}<\u002Fspan><\u002Fdiv>\n      <div class=\"day-title\">${day.title}${goal}<\u002Fdiv>\n      <div class=\"day-mins\">~${day.mins} min<\u002Fdiv>\n      <div class=\"day-tick\" data-daytick=\"${day.d}\"><\u002Fdiv>\n    <\u002Fdiv>\n    <ul class=\"items\">${rows}<\u002Ful>\n    ${prompt}\n  <\u002Fdiv>`;\n}\n\nfunction weekendCard(wk, w) {\n  const col = (label, arr, key) => {\n    const rows = arr.map((it, i) => itemRow(`wk${w.n}-${key}${i}`, it)).join(\"\");\n    return `<div class=\"weekend-col\"><h4>${label}<\u002Fh4><ul class=\"items\">${rows}<\u002Ful><\u002Fdiv>`;\n  };\n  return `<div class=\"weekend\">\n    <div class=\"weekend-head\"><span class=\"we-tag\">${wk.label}<\u002Fspan><h3>Lighter days — review &amp; breathe<\u002Fh3><\u002Fdiv>\n    <div class=\"weekend-grid\">${col(\"Saturday\", wk.sat, \"sat\")}${col(\"Sunday\", wk.sun, \"sun\")}<\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction render() {\n  const html = PLAN.map((w) => {\n    const days = w.days.map(dayCard).join(\"\");\n    const weekend = w.weekend ? weekendCard(w.weekend, w) : \"\";\n    return `<section class=\"week\">\n      <div class=\"week-head\">\n        <span class=\"wk\">WEEK ${w.n}<\u002Fspan>\n        <h2>${w.title}<\u002Fh2>\n        <span class=\"wgoal\">${w.goal}<\u002Fspan>\n      <\u002Fdiv>\n      ${days}${weekend}\n    <\u002Fsection>`;\n  }).join(\"\");\n  document.getElementById(\"plan\").innerHTML = html;\n}\n\nfunction updateProgress() {\n  const boxes = document.querySelectorAll(\".cbox\");\n  const done = [...boxes].filter((b) => b.checked).length;\n  document.getElementById(\"progDone\").textContent = done;\n  document.getElementById(\"progTotal\").textContent = boxes.length;\n  document.getElementById(\"progFill\").style.right = (100 - (done / boxes.length) * 100) + \"%\";\n  // per-day tick counts\n  document.querySelectorAll(\"[data-daygroup]\").forEach((d) => {\n    const ids = d.getAttribute(\"data-daygroup\").split(\" \");\n    const n = ids.filter((id) => state[id]).length;\n    const tick = d.querySelector(\"[data-daytick]\");\n    if (tick) tick.textContent = n === ids.length ? \"✓ done\" : (n ? n + \"/\" + ids.length : \"\");\n  });\n}\n\nfunction onToggle(e) {\n  const box = e.target.closest(\".cbox\");\n  if (!box) return;\n  const id = box.getAttribute(\"data-id\");\n  state[id] = box.checked;\n  if (!box.checked) delete state[id];\n  localStorage.setItem(LS_KEY, JSON.stringify(state));\n  box.closest(\".item\").classList.toggle(\"checked\", box.checked);\n  updateProgress();\n}\n\nfunction applyFilter(tag) {\n  document.querySelectorAll(\".fbtn\").forEach((b) => b.classList.toggle(\"active\", b.dataset.filter === tag));\n  document.querySelectorAll(\".item\").forEach((it) => {\n    it.classList.toggle(\"hide\", tag !== \"ALL\" && it.dataset.tag !== tag);\n  });\n  // hide day/weekend cards with nothing visible\n  document.querySelectorAll(\".day, .weekend\").forEach((card) => {\n    const anyVisible = [...card.querySelectorAll(\".item\")].some((it) => !it.classList.contains(\"hide\"));\n    card.style.display = anyVisible ? \"\" : \"none\";\n  });\n  document.querySelectorAll(\".week\").forEach((wk) => {\n    const anyVisible = [...wk.querySelectorAll(\".day, .weekend\")].some((c) => c.style.display !== \"none\");\n    wk.style.display = anyVisible ? \"\" : \"none\";\n  });\n}\n\nrender();\nupdateProgress();\ndocument.getElementById(\"plan\").addEventListener(\"change\", onToggle);\ndocument.getElementById(\"plan\").addEventListener(\"click\", (e) => {\n  const btn = e.target.closest(\".copy-btn\");\n  if (!btn) return;\n  const body = document.getElementById(btn.getAttribute(\"data-copy\"));\n  if (!body) return;\n  const text = body.textContent.trim();\n  const done = () => { btn.textContent = \"[ Copied \\u2713 ]\"; btn.classList.add(\"copied\"); setTimeout(() => { btn.textContent = \"[ Copy prompt ]\"; btn.classList.remove(\"copied\"); }, 1600); };\n  if (navigator.clipboard && navigator.clipboard.writeText) {\n    navigator.clipboard.writeText(text).then(done).catch(() => { fallbackCopy(text); done(); });\n  } else { fallbackCopy(text); done(); }\n});\nfunction fallbackCopy(text) {\n  const ta = document.createElement(\"textarea\");\n  ta.value = text; ta.style.position = \"fixed\"; ta.style.opacity = \"0\";\n  document.body.appendChild(ta); ta.select();\n  try { document.execCommand(\"copy\"); } catch (e) {}\n  document.body.removeChild(ta);\n}\ndocument.getElementById(\"filters\").addEventListener(\"click\", (e) => {\n  const b = e.target.closest(\".fbtn\");\n  if (b) applyFilter(b.dataset.filter);\n});\ndocument.getElementById(\"resetBtn\").addEventListener(\"click\", () => {\n  if (!confirm(\"Clear every tick and start the run over?\")) return;\n  for (const k in state) delete state[k];\n  localStorage.setItem(LS_KEY, JSON.stringify(state));\n  document.querySelectorAll(\".cbox\").forEach((b) => { b.checked = false; b.closest(\".item\").classList.remove(\"checked\"); });\n  updateProgress();\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
