<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Core Palette" subtitle="The five anchor colors — Bone White, Charcoal, Pulse Blue, Light Pink, Signal Red" viewport="700x180" -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Core Palette</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 0; background: transparent; background-image: none; }
    .card { width: 700px; padding: 24px; box-sizing: border-box; }
    .swatches { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
    .sw { display: flex; flex-direction: column; }
    .sw-chip { height: 96px; border: 1px solid var(--charcoal); position: relative; }
    .sw-chip .da-signal-dot { position: absolute; top: 8px; right: 8px; }
    .sw-meta { display: flex; flex-direction: column; padding-top: 8px; gap: 2px; }
    .sw-name { font-family: var(--font-headers); font-weight: 700; font-size: 12px; letter-spacing: 0.02em; }
    .sw-hex { font-family: var(--font-details); font-size: 10px; color: var(--fg-muted); }
    .sw-role { font-family: var(--font-details); font-size: 9px; color: var(--fg-soft); text-transform: uppercase; letter-spacing: 0.1em; }
  </style>
</head>
<body>
  <div class="card da-lace">
    <div class="swatches">
      <div class="sw">
        <div class="sw-chip" style="background: var(--bone-white)"></div>
        <div class="sw-meta"><span class="sw-name">Bone White</span><span class="sw-hex">#F9F6F0</span><span class="sw-role">Canvas · 75%</span></div>
      </div>
      <div class="sw">
        <div class="sw-chip" style="background: var(--charcoal)"></div>
        <div class="sw-meta"><span class="sw-name">Charcoal</span><span class="sw-hex">#2D2D2D</span><span class="sw-role">Structure · 20%</span></div>
      </div>
      <div class="sw">
        <div class="sw-chip" style="background: var(--pulse-blue)"></div>
        <div class="sw-meta"><span class="sw-name">Pulse Blue</span><span class="sw-hex">#3A7BD5</span><span class="sw-role">Action · live</span></div>
      </div>
      <div class="sw">
        <div class="sw-chip" style="background: var(--light-pink)"></div>
        <div class="sw-meta"><span class="sw-name">Light Pink</span><span class="sw-hex">#FADEEB</span><span class="sw-role">Hover wash</span></div>
      </div>
      <div class="sw">
        <div class="sw-chip" style="background: var(--signal-red)"><span class="da-signal-dot" style="background:#fff; border-color:#fff"></span></div>
        <div class="sw-meta"><span class="sw-name">Signal Red</span><span class="sw-hex">#C5301A</span><span class="sw-role">POI · 5%</span></div>
      </div>
    </div>
  </div>
</body>
</html>
