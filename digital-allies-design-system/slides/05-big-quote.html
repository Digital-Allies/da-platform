<!DOCTYPE html>
<!-- @dsCard group="Slides" name="Slide · Pinned Quote" subtitle="Light theme with pinned-note quote and red pin" viewport="1280x720" -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slide · Pinned Quote</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="stylesheet" href="./_slide.css">
</head>
<body>
  <div class="slide slide--light">
    <div class="slide-header">
      <div class="slide-header__brand">
        <span class="pulse-stack"></span>
        <span class="slide-header__title">Digital Allies · Field Notes</span>
      </div>
      <div class="slide-header__num">
        <span>05 / 12</span>
        <span class="num-box">05</span>
      </div>
    </div>
    <div class="slide-header__rule"></div>

    <div style="position:absolute; top:160px; left:60px; right:60px; bottom:120px;
                display:flex; align-items:center; justify-content:center;">
      <div class="slide-pinned" style="max-width: 920px;">
        <div style="font-family: var(--font-details); font-size:13px; font-weight:700;
                    letter-spacing:0.22em; text-transform:uppercase; color:var(--signal-red);
                    text-align:center; margin-bottom:24px;">
          The No-Ghosting Guarantee
        </div>
        <p style="margin:0; font-family:var(--font-headers); font-weight:600; font-size:48px;
                  line-height:1.2; letter-spacing:-0.01em; text-align:center;">
          "I am historically easy to reach. I live in Kingman. If you call, I answer."
        </p>
        <div style="text-align:center; margin-top:32px; padding-top:24px;
                    border-top: 1px dashed rgba(45,45,45,0.3);
                    font-family:var(--font-details); font-size:18px; font-style:italic; color:var(--fg-muted);">
          It is a very avant-garde concept called "Doing My Job."
        </div>
      </div>
    </div>

    <div class="slide-footer">
      <span class="slide-footer__brand">Digital Allies</span>
      <span class="slide-footer__meta">
        <span>(928) 228-5769</span>
        <span class="sep">·</span>
        <span>contact@digitalallies.net</span>
      </span>
    </div>
  </div>
</body>
</html>
