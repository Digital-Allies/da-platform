<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Allies — Social Carousels</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="stylesheet" href="../colors_and_type.css">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--font-body); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="./design-canvas.jsx"></script>
  <script type="text/babel" src="./Atoms.jsx"></script>
  <script type="text/babel" src="./Kingman.jsx"></script>
  <script type="text/babel" src="./AEO.jsx"></script>
  <script type="text/babel" src="./Strategy.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      // Wait for child scripts to register globals
      const [ready, setReady] = useState(false);
      useEffect(() => {
        const check = () => {
          if (window.KINGMAN_SLIDES && window.AEO_SLIDES && window.STRAT_SLIDES && window.DCSection) {
            setReady(true);
          } else {
            setTimeout(check, 60);
          }
        };
        check();
      }, []);
      if (!ready) {
        return <div style={{ padding: 40, fontFamily: "var(--font-body)" }}>Loading…</div>;
      }

      const W = 1080, H = 1080;

      return (
        <DesignCanvas>
          <DCSection id="kingman" title="The Kingman Data Story" subtitle="Mobile vs desktop in a small mountain town · 6 slides">
            {window.KINGMAN_SLIDES.map((C, i) => (
              <DCArtboard key={i} id={`k${i}`} label={`Slide ${i + 1}`} width={W} height={H}>
                <C />
              </DCArtboard>
            ))}
          </DCSection>

          <DCSection id="aeo" title="AEO vs SEO" subtitle="The new search · why it matters · 9 slides">
            {window.AEO_SLIDES.map((C, i) => (
              <DCArtboard key={i} id={`a${i}`} label={`Slide ${i + 1}`} width={W} height={H}>
                <C />
              </DCArtboard>
            ))}
          </DCSection>

          <DCSection id="strat" title="Digital Strategy Without Jargon" subtitle="Brand intro / follow CTA · 6 slides">
            {window.STRAT_SLIDES.map((C, i) => (
              <DCArtboard key={i} id={`s${i}`} label={`Slide ${i + 1}`} width={W} height={H}>
                <C />
              </DCArtboard>
            ))}
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
