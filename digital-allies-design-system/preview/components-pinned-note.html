<!DOCTYPE html>
<!-- @dsCard group="Components" name="Pinned Note" subtitle="Yellow-paper card + red 4 px pin — used for pull quotes" viewport="700x220" -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pinned Note</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 0; background: transparent; background-image: none; }
    .card { width: 700px; padding: 28px 32px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
    .ex { padding-top: 4px; }
    .heading { font-family: var(--font-details); font-size: 9px; color: var(--fg-soft); text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="card da-lace">
    <div class="ex">
      <div class="heading">The Pinned Note · pull quote</div>
      <div class="da-pinned">
        <p style="margin:0; font-style:italic; font-size:12px; line-height:1.6;">
          "Clean engineering, clear communication, and follow-through that won't require follow up."
        </p>
      </div>
    </div>
    <div class="ex">
      <div class="heading">Manual registry · field-note variant</div>
      <div class="da-pinned" style="text-align:center; padding-top:36px">
        <span class="da-spec" style="display:block; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.18em; font-size:9px;">Manual Registry</span>
        <p style="margin:0; font-style:italic; font-size:11px; line-height:1.5; color:var(--fg-muted)">
          "If you need a glossary to read your website, you've already lost them."
        </p>
        <span class="da-spec" style="display:block; margin-top:10px; text-align:right; font-size:9px; font-weight:700">— Jargon Protocol</span>
      </div>
    </div>
  </div>
</body>
</html>
