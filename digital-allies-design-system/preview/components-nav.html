<!DOCTYPE html>
<!-- @dsCard group="Components" name="Top Nav" subtitle="Pulse dot lockup, link row, EN|ES toggle" viewport="700x80" -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nav Bar</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 0; background: transparent; background-image: none; }
    .card { width: 700px; padding: 0; box-sizing: border-box; border: 1px solid var(--charcoal); background: var(--bg); }
    nav { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
    .brand { display: flex; align-items: center; gap: 10px; font-family: var(--font-headers); font-weight: 700; font-size: 14px; letter-spacing: 0.02em; }
    .links { display: flex; gap: 16px; align-items: center; }
    .links a { font-family: var(--font-details); font-weight: 700; font-size: 10px; color: var(--fg); text-decoration: none; letter-spacing: 0.05em; }
    .links a.active { color: var(--accent); }
    .lang { display: flex; border: 1px solid var(--charcoal); }
    .lang button { font-family: var(--font-details); font-weight: 700; font-size: 10px; padding: 5px 9px; border: none; background: var(--bg); cursor: default; }
    .lang button.on { background: var(--charcoal); color: var(--bone-white); }
    .lang .sep { width: 1px; background: var(--charcoal); }
  </style>
</head>
<body>
  <div class="card">
    <nav>
      <div class="brand">
        <span class="da-pulse-stack"><span class="da-pulse"></span></span>
        <span>Digital Allies</span>
      </div>
      <div class="links">
        <a href="#" class="active">Services</a>
        <a href="#">Pricing</a>
        <a href="#">Reviews</a>
        <a href="#">FAQ</a>
        <a href="#">Contact</a>
        <div class="lang"><button class="on">EN</button><div class="sep"></div><button>ES</button></div>
      </div>
    </nav>
  </div>
</body>
</html>
