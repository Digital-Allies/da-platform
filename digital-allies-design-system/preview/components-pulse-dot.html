<!DOCTYPE html>
<!-- @dsCard group="Components" name="Pulse Dot Logo" subtitle="Animated blue dot + ring — the only continuous animation" viewport="700x200" -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pulse Dot Logo</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 0; background: transparent; background-image: none; }
    .card { width: 700px; padding: 28px 24px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1.2fr; gap: 28px; align-items: center; }
    .left { display: flex; align-items: center; gap: 14px; justify-content: center; padding: 32px 0; border: 1px solid var(--hairline); background: var(--bg); }
    .wordmark { font-family: var(--font-headers); font-weight: 700; font-size: 22px; letter-spacing: 0.02em; }
    .right { font-family: var(--font-details); font-size: 11px; line-height: 1.7; color: var(--fg); }
    .right .row { padding: 4px 0; border-bottom: 1px dashed var(--grid-line-strong); display: flex; justify-content: space-between; }
    .right .row:last-child { border-bottom: none; }
    .right b { font-family: var(--font-headers); font-weight: 700; }
    .heading { font-family: var(--font-details); font-size: 9px; color: var(--fg-soft); text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="left">
      <span class="da-pulse-stack"><span class="da-pulse"></span></span>
      <span class="wordmark">Digital Allies</span>
    </div>
    <div class="right">
      <div class="heading">The Pulse Dot</div>
      <div class="row"><span><b>Dot</b></span><span>12 × 12 px · Pulse Blue</span></div>
      <div class="row"><span><b>Ring</b></span><span>16 × 16 px · scale 1→2.4×</span></div>
      <div class="row"><span><b>Border</b></span><span>1 px Charcoal</span></div>
      <div class="row"><span><b>Pulse</b></span><span>3 s ease-in-out infinite</span></div>
      <div class="row"><span><b>Ring</b></span><span>2.2 s ease-out infinite</span></div>
      <div class="row"><span><b>Use</b></span><span>logo · live indicator</span></div>
      <div class="row"><span><b>Rule</b></span><span>only continuous animation</span></div>
    </div>
  </div>
</body>
</html>
