<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Type — Display & Headings" subtitle="Lexend Deca display + H1–H4 step-down" viewport="700x340" -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Display & Headings</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 0; background: transparent; background-image: none; }
    .card { width: 700px; padding: 24px; box-sizing: border-box; }
    .row { display: grid; grid-template-columns: 130px 1fr; gap: 16px; align-items: baseline; padding: 10px 0; border-bottom: 1px dashed var(--grid-line-strong); }
    .row:last-child { border-bottom: none; }
    .meta { font-family: var(--font-details); font-size: 10px; color: var(--fg-soft); text-transform: uppercase; letter-spacing: 0.1em; line-height: 1.3; }
    .meta b { display: block; color: var(--fg); font-family: var(--font-headers); font-size: 11px; letter-spacing: 0.02em; text-transform: none; }
    .local-badge { display: inline-block; font-family: var(--font-details); font-size: 8px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-on-dark); background: var(--charcoal); padding: 2px 5px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="card da-lace">
    <div style="margin-bottom: 14px;"><span class="local-badge">Lexend Deca · Local · Variable 100–900</span></div>
    <div class="row">
      <div class="meta"><b>Display</b>64 / 700 / −0.01em</div>
      <h1 class="da-display" style="font-size: 44px; margin: 0;">Solutions.</h1>
    </div>
    <div class="row">
      <div class="meta"><b>H1</b>40 / 700 / −0.005em</div>
      <h1 style="margin: 0; font-size: 32px;">The Departments</h1>
    </div>
    <div class="row">
      <div class="meta"><b>H2</b>30 / 700</div>
      <h2 style="margin: 0; font-size: 24px;">Strategy is Free.</h2>
    </div>
    <div class="row">
      <div class="meta"><b>H3</b>18 / 600</div>
      <h3 style="margin: 0;">Dept. of Cooperation</h3>
    </div>
    <div class="row">
      <div class="meta"><b>H4</b>14 / 700</div>
      <h4 style="margin: 0;">Corporate Speak</h4>
    </div>
    <div class="row">
      <div class="meta"><b>Weight range</b>Thin → Black</div>
      <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: baseline;">
        <span style="font-family: var(--font-headers); font-weight: 100; font-size: 18px; color: var(--fg-muted);">Thin</span>
        <span style="font-family: var(--font-headers); font-weight: 300; font-size: 18px; color: var(--fg-muted);">Light</span>
        <span style="font-family: var(--font-headers); font-weight: 400; font-size: 18px;">Regular</span>
        <span style="font-family: var(--font-headers); font-weight: 500; font-size: 18px;">Medium</span>
        <span style="font-family: var(--font-headers); font-weight: 600; font-size: 18px;">SemiBold</span>
        <span style="font-family: var(--font-headers); font-weight: 700; font-size: 18px;">Bold</span>
        <span style="font-family: var(--font-headers); font-weight: 800; font-size: 18px;">ExtraBold</span>
        <span style="font-family: var(--font-headers); font-weight: 900; font-size: 18px;">Black</span>
      </div>
    </div>
  </div>
</body>
</html>
