<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Voice · Tone Coordinates" subtitle="Casual 65 · Dry 55 · Plain 70 · Confident 75 · Authentic 100" viewport="700x310" -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Voice — Tone Spectrum</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; padding: 0; background: transparent; background-image: none; }
    .card { width: 700px; padding: 24px 28px; box-sizing: border-box; }
    .label { font-family: var(--font-details); font-size: 9px; color: var(--fg-soft); text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 18px; display: block; }
    .row { margin-bottom: 16px; }
    .row:last-child { margin-bottom: 0; }
    .row-head { display: flex; justify-content: space-between; font-family: var(--font-details); font-size: 11px; font-weight: 700; margin-bottom: 6px; }
    .row-head .val { color: var(--signal); }
    .track { position: relative; height: 8px; background: var(--field-border); border: 1px solid var(--charcoal); }
    .thumb { position: absolute; top: 50%; width: 14px; height: 14px; background: var(--signal); border: 1px solid var(--charcoal); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: var(--shadow-pin); }
  </style>
</head>
<body>
  <div class="card">
    <span class="label">The Tone Coordinates — calibrated, not vague</span>
    <div class="row">
      <div class="row-head"><span>Formal ←→ Casual</span><span class="val">65% casual</span></div>
      <div class="track"><div class="thumb" style="left:65%"></div></div>
    </div>
    <div class="row">
      <div class="row-head"><span>Dry ←→ Warm</span><span class="val">55% dry</span></div>
      <div class="track"><div class="thumb" style="left:45%"></div></div>
    </div>
    <div class="row">
      <div class="row-head"><span>Technical ←→ Plain</span><span class="val">70% plain</span></div>
      <div class="track"><div class="thumb" style="left:70%"></div></div>
    </div>
    <div class="row">
      <div class="row-head"><span>Confident ←→ Eager</span><span class="val">75% confident</span></div>
      <div class="track"><div class="thumb" style="left:25%"></div></div>
    </div>
    <div class="row">
      <div class="row-head"><span>Performing ←→ Authentic</span><span class="val">100% authentic</span></div>
      <div class="track"><div class="thumb" style="left:100%"></div></div>
    </div>
  </div>
</body>
</html>
